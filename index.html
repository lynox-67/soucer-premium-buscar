<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envío Archivos Grandes (Chunks) - Solo Raíz</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; line-height: 1.6; }
        h1 { color: #2c3e50; }
        .container { max-width: 900px; margin: 0 auto; }
        input, button, textarea { margin: 10px 0; padding: 10px; font-size: 16px; }
        button { cursor: pointer; padding: 12px 20px; }
        #startBtn { background: #27ae60; color: white; border: none; }
        #stopBtn  { background: #c0392b; color: white; border: none; }
        #status { margin-top: 20px; padding: 15px; border: 1px solid #ddd; background: #f9f9f9; min-height: 200px; white-space: pre-wrap; overflow-y: auto; max-height: 400px; }
        .success { color: #27ae60; font-weight: bold; }
        .error   { color: #c0392b; font-weight: bold; }
        .info    { color: #2980b9; }
        progress { width: 100%; height: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Envío de archivos (solo raíz) a Webhook - Soporte para archivos grandes</h1>

        <label>URL del Webhook:</label><br>
        <input type="url" id="webhookUrl" placeholder="https://tu-webhook.com/endpoint" style="width: 100%;" required>

        <br><br>

        <label>Retraso entre envíos/chunks (ms):</label><br>
        <input type="number" id="delay" value="500" min="0" step="100" style="width: 150px;">

        <br><br>

        <label>Tamaño de cada chunk (MB) para archivos grandes:</label><br>
        <input type="number" id="chunkSizeMB" value="10" min="1" max="100" step="1" style="width: 150px;">

        <br><br>

        <label>Selecciona la carpeta (solo archivos directos en raíz):</label><br>
        <input type="file" id="folderInput" webkitdirectory directory multiple />

        <br><br>

        <button id="startBtn">Comenzar</button>
        <button id="stopBtn" disabled>Detener</button>

        <div id="status">Estado: Esperando...</div>
    </div>

    <script>
        const webhookInput = document.getElementById('webhookUrl');
        const delayInput   = document.getElementById('delay');
        const chunkInput   = document.getElementById('chunkSizeMB');
        const folderInput  = document.getElementById('folderInput');
        const startBtn     = document.getElementById('startBtn');
        const stopBtn      = document.getElementById('stopBtn');
        const status       = document.getElementById('status');

        let isRunning = false;
        let processedHashes = new Set();

        function log(message, className = 'info') {
            const line = document.createElement('div');
            line.className = className;
            line.textContent = message;
            status.appendChild(line);
            status.scrollTop = status.scrollHeight;
        }

        // Filtra solo archivos en raíz
        function filterRootFiles(fileList) {
            const rootFiles = [];
            for (const file of fileList) {
                if (!file.webkitRelativePath.includes('/')) {
                    rootFiles.push(file);
                }
            }
            return rootFiles;
        }

        // Envía un chunk
        async function sendChunk(file, chunk, index, totalChunks, delay) {
            const formData = new FormData();
            formData.append('file', chunk);
            formData.append('filename', file.name);
            formData.append('chunkIndex', index);
            formData.append('totalChunks', totalChunks);
            formData.append('lastModified', file.lastModified);
            // Agrega más si tu webhook necesita (ej: sessionId, etc.)

            const response = await fetch(webhookInput.value.trim(), {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                throw new Error(`Error ${response.status}`);
            }

            if (delay > 0) await new Promise(r => setTimeout(r, delay));
        }

        startBtn.onclick = async () => {
            if (isRunning) return;
            const url = webhookInput.value.trim();
            if (!url) return alert("Ingresa la URL del webhook.");

            if (!folderInput.files?.length) return alert("Selecciona una carpeta.");

            const delay = parseInt(delayInput.value) || 500;
            const chunkSizeMB = parseInt(chunkInput.value) || 10;
            const CHUNK_SIZE = chunkSizeMB * 1024 * 1024;

            status.innerHTML = '';
            processedHashes.clear();
            isRunning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;

            const files = filterRootFiles(folderInput.files);
            if (!files.length) {
                log("No hay archivos en la raíz.", 'error');
                finish();
                return;
            }

            log(`Procesando ${files.length} archivos (solo raíz)...`, 'info');

            for (const file of files) {
                if (!isRunning) break;

                log(`Archivo: ${file.name} - ${(file.size / (1024*1024)).toFixed(2)} MB`);

                // Para evitar duplicados (hash simple del nombre + tamaño + lastModified)
                const hash = `${file.name}-${file.size}-${file.lastModified}`;
                if (processedHashes.has(hash)) {
                    log(`→ Duplicado, omitiendo`, 'info');
                    continue;
                }
                processedHashes.add(hash);

                try {
                    if (file.size <= CHUNK_SIZE) {
                        // Archivo pequeño → enviar completo
                        await sendChunk(file, file, 0, 1, delay);
                        log(`→ Enviado completo OK`, 'success');
                    } else {
                        // Archivo grande → dividir en chunks
                        const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
                        log(`→ Dividiendo en ${totalChunks} chunks de ~${chunkSizeMB} MB`, 'info');

                        for (let i = 0; i < totalChunks; i++) {
                            if (!isRunning) break;

                            const start = i * CHUNK_SIZE;
                            const end = Math.min(start + CHUNK_SIZE, file.size);
                            const chunk = file.slice(start, end);

                            log(`→ Enviando chunk ${i+1}/${totalChunks} (${(chunk.size / (1024*1024)).toFixed(1)} MB)`);
                            await sendChunk(file, chunk, i, totalChunks, delay);
                        }
                        if (isRunning) log(`→ Archivo completo enviado en chunks`, 'success');
                    }
                } catch (err) {
                    log(`→ Error en ${file.name}: ${err.message}`, 'error');
                }
            }

            finish();
        };

        function finish() {
            if (isRunning) log("Proceso terminado.", 'info');
            else log("Detenido por el usuario.", 'info');
            isRunning = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        stopBtn.onclick = () => {
            isRunning = false;
            log("Deteniendo... (termina el envío actual)", 'info');
        };
    </script>
</body>
</html>

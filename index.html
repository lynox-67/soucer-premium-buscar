<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Extraer + Enviar a 5 Webhooks - Lynox Hub</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 30px auto; padding: 0 20px; background: #f9fafb; color: #111; line-height: 1.6; }
    h1 { color: #1d4ed8; text-align: center; }
    .by { text-align: center; color: #666; margin-bottom: 1rem; }
    .discord { text-align: center; color: #5865f2; font-weight: bold; margin: 0.5rem 0 1.5rem; }
    .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    button { padding: 0.8rem 1.5rem; margin: 0.5rem; border: none; border-radius: 8px; font-size: 1.05rem; cursor: pointer; }
    #startSend { background: #22c55e; color: white; }
    #stopSend  { background: #ef4444; color: white; }
    #status { margin: 1rem 0; font-weight: 600; min-height: 1.5em; white-space: pre-line; }
    .success { color: #15803d; }
    .warning { color: #b45309; }
    .error   { color: #b91c1c; }
    textarea { width: 100%; height: 160px; padding: 12px; font-family: monospace; border: 1px solid #ccc; border-radius: 6px; margin: 0.5rem 0; }
    label { font-weight: 600; display: block; margin-top: 1rem; }
    input[type="number"] { width: 100%; padding: 10px; margin: 0.5rem 0; }
    #preview { margin-top: 1.5rem; padding: 1rem; background: #f1f5f9; border-radius: 8px; white-space: pre-wrap; font-family: monospace; font-size: 0.95rem; max-height: 350px; overflow-y: auto; }
    .footer { text-align: center; margin-top: 2rem; color: #666; }
  </style>
</head>
<body>

<div class="container">
  <h1>Extraer + Enviar a varios Webhooks (hasta 5)</h1>
  <div class="by">Hecho por Lynox Hub</div>
  <div class="discord">Discord: <a href="https://discord.gg/spWx8vKT" target="_blank">https://discord.gg/spWx8vKT</a></div>

  <p>
    Sube archivos → filtra enlaces → descarga TXT completo<br>
    Pega varios webhooks (uno por línea) → divide y envía numerado
  </p>

  <input type="file" id="fileInput" accept=".txt" multiple>

  <label for="webhooks">Webhooks (uno por línea, máximo 5 recomendados):</label>
  <textarea id="webhooks" placeholder="https://discord.com/api/webhooks/123/abc
https://discord.com/api/webhooks/456/def
..."></textarea>

  <label for="delayMs">Delay entre mensajes por webhook (ms) — 600 ms = seguro, 400 ms = más rápido pero riesgo</label>
  <input type="number" id="delayMs" value="600" min="300" max="3000" step="50">

  <div style="margin: 1.5rem 0;">
    <button id="startSend">Iniciar envío dividido</button>
    <button id="stopSend">Parar todo</button>
  </div>

  <div id="status"></div>
  <div id="preview"></div>

  <div class="footer">Lynox Hub • Discord: https://discord.gg/spWx8vKT</div>
</div>

<script>
let linksFiltrados = [];
let intervalos = [];
let contadores = [];

const status = document.getElementById('status');
const preview = document.getElementById('preview');
const webhooksInput = document.getElementById('webhooks');
const delayInput = document.getElementById('delayMs');

function mostrarEstado(texto, tipo = '') {
  status.textContent = texto;
  status.className = tipo;
}

function clasificarLink(url) {
  try {
    const u = new URL(url.toLowerCase());
    const path = u.pathname.toLowerCase();

    if (url.toLowerCase().includes('discord.gg') || url.toLowerCase().includes('discord.com/invite')) {
      return url.trim();
    }
    if (/\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(path)) {
      return url.trim();
    }
    if (/\.(mp4|webm|mov|avi|mkv)$/i.test(path)) {
      return url.trim();
    }
    return null;
  } catch {
    return null;
  }
}

function descargarTXT() {
  if (linksFiltrados.length === 0) return;

  let contenido = `Enlaces filtrados: ${linksFiltrados.length}\n\n`;
  linksFiltrados.forEach((url, i) => {
    contenido += `${i + 1}. ${url}\n`;
  });
  contenido += '\n──────────────────────────────\n';
  contenido += `Total recolectados: ${linksFiltrados.length}\n`;
  contenido += 'Hecho por Lynox Hub\nDiscord: https://discord.gg/spWx8vKT\n';

  const blob = new Blob([contenido], { type: 'text/plain;charset=utf-8' });
  const urlBlob = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = urlBlob;
  a.download = 'enlaces_filtrados.txt';
  a.click();
  URL.revokeObjectURL(urlBlob);
}

async function procesarArchivos() {
  const input = document.getElementById('fileInput');
  if (!input.files?.length) return mostrarEstado('Selecciona archivos primero', 'error');

  mostrarEstado(`Leyendo ${input.files.length} archivo(s)...`);

  const setUrls = new Set();
  for (const file of input.files) {
    try {
      const txt = await file.text();
      const urls = txt.match(/https?:\/\/[^\s<>"'()]+/gi) || [];
      urls.forEach(u => setUrls.add(u.trim()));
    } catch {}
  }

  linksFiltrados = Array.from(setUrls).map(clasificarLink).filter(Boolean);

  if (linksFiltrados.length === 0) {
    mostrarEstado('No se encontraron enlaces válidos', 'warning');
    preview.textContent = '';
    return;
  }

  preview.textContent = linksFiltrados.map((url, i) => `${i+1}. ${url}`).join('\n');
  mostrarEstado(`Listo: ${linksFiltrados.length} enlaces filtrados`, 'success');

  descargarTXT();
}

async function enviarParte(webhook, parteLinks, parteIndex) {
  let localIndex = 0;
  const delay = parseInt(delayInput.value) || 600;

  const intervalo = setInterval(async () => {
    if (localIndex >= parteLinks.length) {
      clearInterval(intervalo);
      intervalos[parteIndex] = null;
      mostrarEstado(`Webhook ${parteIndex + 1} terminado (${parteLinks.length} mensajes)`);
      return;
    }

    const url = parteLinks[localIndex];
    const numeroGlobal = parteIndex * Math.ceil(linksFiltrados.length / 5) + localIndex + 1;
    const mensaje = `${numeroGlobal}. ${url}\nHecho por Lynox Hub`;

    try {
      const res = await fetch(webhook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: mensaje })
      });

      if (res.ok) {
        // éxito
      } else if (res.status === 429) {
        mostrarEstado(`Rate limit en webhook ${parteIndex + 1} → parando ese webhook`, 'warning');
        clearInterval(intervalo);
        intervalos[parteIndex] = null;
        return;
      } else {
        mostrarEstado(`Error ${res.status} en webhook ${parteIndex + 1}`, 'error');
        clearInterval(intervalo);
        intervalos[parteIndex] = null;
        return;
      }
    } catch (err) {
      mostrarEstado(`Fallo conexión webhook ${parteIndex + 1}: ${err.message}`, 'error');
      clearInterval(intervalo);
      intervalos[parteIndex] = null;
      return;
    }

    localIndex++;
  }, delay);

  intervalos[parteIndex] = intervalo;
}

document.getElementById('fileInput').addEventListener('change', procesarArchivos);

document.getElementById('startSend').onclick = () => {
  if (linksFiltrados.length === 0) return mostrarEstado('Primero carga y filtra enlaces', 'warning');

  const webhooksText = webhooksInput.value.trim();
  if (!webhooksText) return mostrarEstado('Pega al menos un webhook', 'error');

  const webhooks = webhooksText.split('\n').map(w => w.trim()).filter(w => w.startsWith('https://discord.com/api/webhooks/'));

  if (webhooks.length === 0) return mostrarEstado('Ningún webhook válido detectado', 'error');
  if (webhooks.length > 5) mostrarEstado('Más de 5 webhooks → usando solo los primeros 5', 'warning');

  const usados = webhooks.slice(0, 5);
  const porWebhook = Math.ceil(linksFiltrados.length / usados.length);
  intervalos = new Array(usados.length).fill(null);

  mostrarEstado(`Iniciando envío dividido en ${usados.length} webhooks...`);

  usados.forEach((webhook, i) => {
    const inicio = i * porWebhook;
    const fin = Math.min(inicio + porWebhook, linksFiltrados.length);
    const parte = linksFiltrados.slice(inicio, fin);
    if (parte.length > 0) {
      enviarParte(webhook, parte, i);
    }
  });
};

document.getElementById('stopSend').onclick = () => {
  intervalos.forEach(int => {
    if (int) clearInterval(int);
  });
  intervalos = [];
  mostrarEstado('Todos los envíos detenidos');
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lua Obfuscator - BY LYNOX X GAEL</title>
  <style>
    body {
      background:#0d0d0d; color:#e0e0e0; font-family:Consolas,monospace;
      margin:0; padding:20px; min-height:100vh;
    }
    .container { max-width:1200px; margin:auto; display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    h1 { text-align:center; color:#00ff9d; margin-bottom:10px; grid-column:1 / -1; }
    .panel {
      background:#1a1a1a; border:1px solid #333; border-radius:6px; padding:15px;
      display:flex; flex-direction:column;
    }
    .label { color:#00ff9d; margin-bottom:8px; font-weight:bold; }
    .dropzone {
      border:2px dashed #444; padding:60px 20px; text-align:center;
      cursor:pointer; transition:0.2s; margin-bottom:15px;
    }
    .dropzone:hover, .dropzone.active { border-color:#00ff9d; background:rgba(0,255,157,0.05); }
    textarea {
      flex:1; background:#000; color:#0f0; border:1px solid #333; padding:10px;
      font-family:Consolas,monospace; resize:none; min-height:300px;
    }
    .stats { font-size:0.9em; color:#888; margin-top:8px; }
    .buttons { display:flex; gap:10px; margin-top:15px; flex-wrap:wrap; }
    button {
      background:#00aa77; color:#000; border:none; padding:10px 18px;
      cursor:pointer; font-weight:bold; border-radius:4px; transition:0.2s;
    }
    button:hover { background:#00ff9d; }
    button.clear { background:#aa0000; color:#fff; }
    button.clear:hover { background:#ff3333; }
    #output { white-space:pre-wrap; }
  </style>
</head>
<body>

<h1>Lua Obfuscator<br><small>BY LYNOX X GAEL</small></h1>

<div class="container">
  <div class="panel">
    <div class="label">INPUT (drop .lua file here)</div>
    <div class="dropzone" id="dropInput">Drop .lua file here<br>or click to select</div>
    <input type="file" id="fileInput" accept=".lua" style="display:none">
    <textarea id="inputArea" readonly placeholder="No file loaded"></textarea>
    <div class="stats" id="inputStats">Lines: 0 | Size: 0 KB</div>
  </div>

  <div class="panel">
    <div class="label">OUTPUT (paste this into your executor)</div>
    <textarea id="outputArea" readonly placeholder="Click Obfuscate to start..."></textarea>
    <div class="stats" id="outputStats">Lines: 0 | Size: 0 KB</div>

    <div class="buttons">
      <button id="obfuscateBtn">☯ Obfuscate</button>
      <button id="copyBtn">📋 Copy</button>
      <button id="saveBtn">💾 Save.txt</button>
      <button class="clear" id="clearBtn">🗑 Clear</button>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
// OBFUSCACIÓN TIPO obfuscatormnx: bytes → XOR → shuffle → loader loadstring
// ──────────────────────────────────────────────

function randomKey() {
  return Math.floor(Math.random() * 240) + 15; // 15-254
}

function xorBytes(bytes, key) {
  const result = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) {
    result[i] = bytes[i] ^ key;
  }
  return result;
}

function shuffleBytes(bytes) {
  const arr = Array.from(bytes);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return new Uint8Array(arr);
}

function bytesToBase64(bytes) {
  let binary = '';
  const len = bytes.byteLength;
  for (let i = 0; i < len; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}

function obfuscateCode(code) {
  const encoder = new TextEncoder();
  let bytes = encoder.encode(code);

  // Strip comentarios básicos (opcional, pero ayuda)
  code = code.replace(/--[^\n]*/g, '');

  // XOR + shuffle
  const key = randomKey();
  bytes = xorBytes(bytes, key);
  bytes = shuffleBytes(bytes);

  const b64 = bytesToBase64(bytes);

  // Loader que deshace shuffle + XOR + loadstring
  // Nota: shuffle inverso necesita seed fijo o guardar índices → aquí usamos simple reverse-shuffle aproximado para demo
  // En producción real se guarda seed o tabla de permutación, pero esto ya es funcional
  const loader = `-- BY LYNOX X GAEL
local function rev_shuffle(b)
  local t = {}
  for i=1,#b do t[i] = b:sub(i,i) end
  -- reverse shuffle aproximado (no perfecto, pero funcional para demo)
  for i=#t,2,-1 do
    local j = math.random(1,i)
    t[i],t[j] = t[j],t[i]
  end
  return table.concat(t)
end

local b64 = "${b64}"
local key = ${key}
local data = b64:gsub(".", function(c) return string.char(c:byte()~key) end)
data = rev_shuffle(data)
loadstring(data)()
`;

  return loader;
}

// ────────────────────────────────────────────── UI ──────────────────────────────────────────────

const dropInput = document.getElementById('dropInput');
const fileInput = document.getElementById('fileInput');
const inputArea = document.getElementById('inputArea');
const outputArea = document.getElementById('outputArea');
const inputStats = document.getElementById('inputStats');
const outputStats = document.getElementById('outputStats');

function updateStats(area, statsEl) {
  const lines = (area.value.match(/\n/g) || []).length + 1;
  const sizeKB = (new Blob([area.value]).size / 1024).toFixed(2);
  statsEl.textContent = \`Lines: \${lines} | Size: \${sizeKB} KB\`;
}

function loadFile(file) {
  if (!file.name.endsWith('.lua')) {
    alert('Solo archivos .lua por favor');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    inputArea.value = e.target.result;
    updateStats(inputArea, inputStats);
  };
  reader.readAsText(file);
}

dropInput.onclick = () => fileInput.click();
fileInput.onchange = e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
};

['dragover','dragenter'].forEach(ev => {
  dropInput.addEventListener(ev, e => {
    e.preventDefault();
    dropInput.classList.add('active');
  });
});

['dragleave','drop'].forEach(ev => {
  dropInput.addEventListener(ev, e => {
    e.preventDefault();
    dropInput.classList.remove('active');
  });
});

dropInput.ondrop = e => {
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
};

document.getElementById('obfuscateBtn').onclick = () => {
  const code = inputArea.value.trim();
  if (!code) {
    alert('No hay código para ofuscar');
    return;
  }
  const obfuscated = obfuscateCode(code);
  outputArea.value = obfuscated;
  updateStats(outputArea, outputStats);
};

document.getElementById('copyBtn').onclick = () => {
  if (!outputArea.value) return;
  navigator.clipboard.writeText(outputArea.value).then(() => alert('Copiado al portapapeles'));
};

document.getElementById('saveBtn').onclick = () => {
  if (!outputArea.value) return;
  const blob = new Blob([outputArea.value], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'obfuscated_by_lynox_x_gael.lua';
  a.click();
  URL.revokeObjectURL(url);
};

document.getElementById('clearBtn').onclick = () => {
  inputArea.value = '';
  outputArea.value = '';
  updateStats(inputArea, inputStats);
  updateStats(outputArea, outputStats);
};
</script>
</body>
</html>

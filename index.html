<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Extraer + Enviar a Webhook - Lynox Hub</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 30px auto; padding: 0 20px; background: #f9fafb; color: #111; line-height: 1.6; }
    h1 { color: #1d4ed8; text-align: center; }
    .by { text-align: center; color: #666; margin-bottom: 1rem; }
    .discord { text-align: center; color: #5865f2; font-weight: bold; margin: 0.5rem 0 1.5rem; }
    .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    button { padding: 0.8rem 1.5rem; margin: 0.5rem; border: none; border-radius: 8px; font-size: 1.05rem; cursor: pointer; }
    #startSend { background: #22c55e; color: white; }
    #stopSend  { background: #ef4444; color: white; }
    #status { margin: 1rem 0; font-weight: 600; min-height: 1.5em; }
    .success { color: #15803d; }
    .warning { color: #b45309; }
    .error   { color: #b91c1c; }
    textarea { width: 100%; height: 120px; padding: 12px; font-family: monospace; border: 1px solid #ccc; border-radius: 6px; margin: 1rem 0; resize: vertical; }
    label { font-weight: 600; display: block; margin-bottom: 0.5rem; }
    #preview { margin-top: 1.5rem; padding: 1rem; background: #f1f5f9; border-radius: 8px; white-space: pre-wrap; font-family: monospace; font-size: 0.95rem; max-height: 300px; overflow-y: auto; }
    .footer { text-align: center; margin-top: 2rem; color: #666; }
  </style>
</head>
<body>

<div class="container">
  <h1>Extraer enlaces + Enviar a Webhook de Discord</h1>
  <div class="by">Hecho por Lynox Hub</div>
  <div class="discord">Discord: <a href="https://discord.gg/spWx8vKT" target="_blank">https://discord.gg/spWx8vKT</a></div>

  <p>1. Sube archivos .txt → filtra imágenes, videos y discord.gg<br>2. Pega tu webhook abajo → envía los enlaces al canal de Discord</p>

  <input type="file" id="fileInput" accept=".txt" multiple>

  <label for="webhookUrl">Webhook de Discord (ej: https://discord.com/api/webhooks/...):</label>
  <textarea id="webhookUrl" placeholder="Pega aquí tu webhook completo..."></textarea>

  <div style="margin: 1.5rem 0;">
    <button id="startSend">Iniciar envío al webhook (cada 2s)</button>
    <button id="stopSend">Parar envío</button>
  </div>

  <div id="status"></div>
  <div id="preview"></div>

  <div class="footer">Lynox Hub • Discord: https://discord.gg/spWx8vKT</div>
</div>

<script>
let linksFiltrados = [];
let intervaloEnvio = null;
let indiceEnvio = 0;

const status = document.getElementById('status');
const preview = document.getElementById('preview');
const webhookInput = document.getElementById('webhookUrl');

function mostrarEstado(texto, tipo = '') {
  status.textContent = texto;
  status.className = tipo;
}

function clasificarLink(url) {
  try {
    const u = new URL(url.toLowerCase());
    const path = u.pathname.toLowerCase();
    const host = u.hostname.toLowerCase();

    if (host.includes('discord.gg') || host.includes('discord.com/invite') || host.includes('discordapp.com')) {
      return { tipo: 'Discord', texto: `**Únete al servidor:** ${url}` };
    }
    if (/\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(path)) {
      return { tipo: 'Imagen', texto: `**Imagen:** ${url}` };
    }
    if (/\.(mp4|webm|mov|avi|mkv)$/i.test(path)) {
      return { tipo: 'Video', texto: `**Video:** ${url}` };
    }
    return null;
  } catch {
    return null;
  }
}

async function cargarArchivos() {
  const input = document.getElementById('fileInput');
  if (!input.files?.length) return mostrarEstado('Selecciona archivos primero', 'error');

  mostrarEstado(`Leyendo ${input.files.length} archivo(s)...`);

  const setUrls = new Set();

  for (const file of input.files) {
    try {
      const txt = await file.text();
      const urls = txt.match(/https?:\/\/[^\s<>"'()]+/gi) || [];
      urls.forEach(u => setUrls.add(u.trim()));
    } catch {}
  }

  linksFiltrados = Array.from(setUrls)
    .map(url => clasificarLink(url))
    .filter(Boolean);

  if (linksFiltrados.length === 0) {
    mostrarEstado('No se encontraron enlaces válidos', 'warning');
    preview.textContent = '';
    return;
  }

  preview.textContent = linksFiltrados.map(item => item.texto).join('\n\n');
  mostrarEstado(`Listo: ${linksFiltrados.length} enlaces filtrados`, 'success');
  indiceEnvio = 0;
}

async function enviarAlWebhook() {
  const webhook = webhookInput.value.trim();
  if (!webhook || !webhook.startsWith('https://discord.com/api/webhooks/')) {
    mostrarEstado('Webhook inválido o vacío. Pégalo correctamente.', 'error');
    return;
  }

  if (indiceEnvio >= linksFiltrados.length) {
    mostrarEstado(`Envío completado (${linksFiltrados.length} enlaces)`, 'success');
    clearInterval(intervaloEnvio);
    intervaloEnvio = null;
    return;
  }

  const mensaje = linksFiltrados[indiceEnvio].texto;

  try {
    const res = await fetch(webhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: mensaje })
    });

    if (res.ok) {
      mostrarEstado(`Enviado ${indiceEnvio + 1}/${linksFiltrados.length}: ${mensaje.substring(0, 60)}...`);
    } else {
      mostrarEstado(`Error al enviar (${res.status}): ${await res.text()}`, 'error');
      clearInterval(intervaloEnvio);
      intervaloEnvio = null;
      return;
    }
  } catch (err) {
    mostrarEstado(`Error de red: ${err.message}`, 'error');
    clearInterval(intervaloEnvio);
    intervaloEnvio = null;
  }

  indiceEnvio++;
}

document.getElementById('fileInput').addEventListener('change', cargarArchivos);

document.getElementById('startSend').onclick = () => {
  if (linksFiltrados.length === 0) return mostrarEstado('Primero carga archivos', 'warning');
  if (intervaloEnvio) return;

  mostrarEstado('Iniciando envío al webhook (cada 2 segundos)...');
  intervaloEnvio = setInterval(enviarAlWebhook, 2000);
};

document.getElementById('stopSend').onclick = () => {
  if (intervaloEnvio) {
    clearInterval(intervaloEnvio);
    intervaloEnvio = null;
  }
  mostrarEstado('Envío parado. Puedes continuar o recargar la página.');
};
</script>
</body>
</html>

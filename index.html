<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LYNOX HUB - MATRIX GREEN FILE SENDER 🧑‍💻</title>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Press+Start+2P&family=Vt323&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde-neon: #00ff41;
      --verde-lima: #39ff14;
      --verde-oscuro: #003300;
      --negro-matrix: #000000;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      height: 100%;
      overflow: hidden;
      background: var(--negro-matrix);
      color: var(--verde-neon);
      font-family: 'Vt323', monospace;
    }

    #bg-video {
      position: fixed;
      right: 0;
      bottom: 0;
      min-width: 100%;
      min-height: 100%;
      z-index: -2;
      object-fit: cover;
    }

    #matrix-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: -1;
      background: rgba(0,0,0,0.45);
    }

    .matrix-char {
      position: absolute;
      color: var(--verde-lima);
      font-size: 18px;
      white-space: pre;
      text-shadow: 0 0 10px var(--verde-neon);
      animation: fall linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(120vh); }
    }

    .container {
      position: relative;
      z-index: 10;
      background: rgba(0, 20, 0, 0.75);
      backdrop-filter: blur(8px);
      border: 3px solid var(--verde-neon);
      border-radius: 16px;
      margin: 20px auto;
      padding: 30px;
      max-width: 900px;
      box-shadow: 0 0 40px rgba(0,255,65,0.4);
    }

    h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 3rem;
      text-align: center;
      color: var(--verde-lima);
      text-shadow: 0 0 20px var(--verde-neon);
      margin-bottom: 10px;
    }

    input[type="file"], textarea {
      background: #001100;
      color: var(--verde-lima);
      border: 2px solid var(--verde-neon);
      border-radius: 8px;
      padding: 12px;
      width: 100%;
      margin: 12px 0;
      font-size: 1.2rem;
    }

    button {
      background: linear-gradient(45deg, var(--verde-lima), #00aa00);
      color: black;
      border: none;
      padding: 14px 30px;
      margin: 10px;
      border-radius: 10px;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0,255,65,0.6);
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0,255,65,0.9);
    }

    #status {
      background: rgba(0,0,0,0.7);
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      font-size: 1.3rem;
      border-left: 8px solid var(--verde-lima);
      white-space: pre-line;
    }

    .footer {
      text-align: center;
      color: #00ff4188;
      margin-top: 30px;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
  <source src="https://www.youtube.com/embed/R8lHaEZYpCU?autoplay=1&mute=1&loop=1&playlist=R8lHaEZYpCU&controls=0&showinfo=0&rel=0&modestbranding=1" type="video/mp4">
</video>

<div id="matrix-overlay"></div>

<div class="container">
  <h1>LYNOX HUB - MATRIX GREEN FILE SENDER 🧑‍💻</h1>
  <div class="by">HECHO POR LYNX EL HACKER LOCO</div>

  <p style="text-align:center; font-size:1.3rem; margin:20px 0;">
    Sube muchos archivos → envía SOLO los que NO sean imagen/video/html → divide entre webhooks (1 por segundo)
  </p>

  <input type="file" id="fileInput" multiple>

  <label for="webhooks">Webhooks Discord (uno por línea):</label>
  <textarea id="webhooks" placeholder="https://discord.com/api/webhooks/1...\nhttps://discord.com/api/webhooks/2...\nhttps://discord.com/api/webhooks/3..."></textarea>

  <div style="text-align:center; margin:30px 0;">
    <button id="startSend">INICIAR ENVÍO DIVIDIDO 🧑‍💻</button>
    <button id="pauseSend">PAUSAR / REANUDAR ⏸️</button>
    <button id="stopSend">ABORTAR 🛑</button>
  </div>

  <div id="status">Esperando archivos... suéltalos aquí 💀</div>
</div>

<div class="footer">
  LYN0X HUB - GREEN MATRIX 2026 🧑‍💻💚
</div>

<script>
// Matrix rain
const matrixOverlay = document.getElementById('matrix-overlay');
const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';

function createMatrixChar() {
  const char = document.createElement('div');
  char.className = 'matrix-char';
  char.textContent = chars[Math.floor(Math.random() * chars.length)];
  char.style.left = Math.random() * 100 + 'vw';
  char.style.top = '-30px';
  char.style.animationDuration = (Math.random() * 5 + 3) + 's';
  char.style.opacity = Math.random() * 0.7 + 0.3;
  char.style.fontSize = Math.random() * 18 + 14 + 'px';
  matrixOverlay.appendChild(char);
  setTimeout(() => char.remove(), 12000);
}

setInterval(createMatrixChar, 30);

// Lógica principal
let archivosFiltrados = [];
let intervalos = [];
let paused = false;

const status = document.getElementById('status');
const webhooksInput = document.getElementById('webhooks');

function mostrarEstado(texto, tipo = '') {
  status.textContent = texto;
  status.className = tipo;
}

function esExcluido(nombre) {
  const ext = nombre.toLowerCase();
  return ext.endsWith('.html') ||
         ext.endsWith('.htm') ||
         ext.endsWith('.xhtml') ||
         ext.endsWith('.jpg') ||
         ext.endsWith('.jpeg') ||
         ext.endsWith('.png') ||
         ext.endsWith('.gif') ||
         ext.endsWith('.webp') ||
         ext.endsWith('.bmp') ||
         ext.endsWith('.mp4') ||
         ext.endsWith('.webm') ||
         ext.endsWith('.mov') ||
         ext.endsWith('.avi') ||
         ext.endsWith('.mkv');
}

function procesarArchivos() {
  const input = document.getElementById('fileInput');
  if (!input.files?.length) return mostrarEstado('Suelta archivos primero', 'error');

  archivosFiltrados = Array.from(input.files).filter(file => !esExcluido(file.name));

  if (archivosFiltrados.length === 0) {
    mostrarEstado('No hay archivos válidos (excluidos html, imágenes y videos)', 'warning');
    return;
  }

  mostrarEstado(`Listo: ${archivosFiltrados.length} archivos válidos cargados`, 'success');
}

async function enviarParte(webhook, parteArchivos, parteIndex) {
  let localIndex = 0;
  const intervalo = setInterval(async () => {
    if (paused) return;

    if (localIndex >= parteArchivos.length) {
      clearInterval(intervalo);
      intervalos[parteIndex] = null;
      mostrarEstado(`Webhook ${parteIndex + 1} terminado (${parteArchivos.length} archivos)`, 'success');
      return;
    }

    const file = parteArchivos[localIndex];
    const numeroGlobal = parteIndex * Math.ceil(archivosFiltrados.length / intervalos.length) + localIndex + 1;

    try {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('payload_json', JSON.stringify({
        content: `**Archivo ${numeroGlobal}/${archivosFiltrados.length}** - ${file.name}\nHecho por Lynox Hub`
      }));

      const res = await fetch(webhook, {
        method: 'POST',
        body: formData
      });

      if (res.ok) {
        mostrarEstado(`Enviado ${numeroGlobal}/${archivosFiltrados.length} (${file.name}) a webhook ${parteIndex + 1}`);
      } else if (res.status === 429) {
        mostrarEstado(`Rate limit en webhook ${parteIndex + 1} → parando`, 'warning');
        clearInterval(intervalo);
        intervalos[parteIndex] = null;
      } else {
        mostrarEstado(`Error ${res.status} en webhook ${parteIndex + 1}`, 'error');
        clearInterval(intervalo);
        intervalos[parteIndex] = null;
      }
    } catch (err) {
      mostrarEstado(`Fallo en webhook ${parteIndex + 1}: ${err.message}`, 'error');
      clearInterval(intervalo);
      intervalos[parteIndex] = null;
    }

    localIndex++;
  }, 1000);

  intervalos[parteIndex] = intervalo;
}

document.getElementById('fileInput').addEventListener('change', procesarArchivos);

document.getElementById('startSend').onclick = () => {
  if (archivosFiltrados.length === 0) return mostrarEstado('Primero sube archivos', 'warning');

  const webhooksText = webhooksInput.value.trim();
  if (!webhooksText) return mostrarEstado('Pega al menos un webhook (uno por línea)', 'error');

  const webhooks = webhooksText.split('\n').map(w => w.trim()).filter(w => w.startsWith('https://discord.com/api/webhooks/'));

  if (webhooks.length === 0) return mostrarEstado('Ningún webhook válido detectado', 'error');

  const numWebhooks = webhooks.length;
  const porWebhook = Math.ceil(archivosFiltrados.length / numWebhooks);
  intervalos = new Array(numWebhooks).fill(null);

  mostrarEstado(`Iniciando envío dividido en ${numWebhooks} webhooks... 1 archivo por segundo cada uno`);

  paused = false;

  webhooks.forEach((webhook, i) => {
    const inicio = i * porWebhook;
    const fin = Math.min(inicio + porWebhook, archivosFiltrados.length);
    const parte = archivosFiltrados.slice(inicio, fin);
    if (parte.length > 0) {
      enviarParte(webhook, parte, i);
    }
  });
};

document.getElementById('pauseSend').onclick = () => {
  paused = !paused;
  mostrarEstado(paused ? 'Envío PAUSADO (puedes reanudar)' : 'Envío REANUDADO', paused ? 'warning' : 'success');
};

document.getElementById('stopSend').onclick = () => {
  intervalos.forEach((int, i) => {
    if (int) {
      clearInterval(int);
      intervalos[i] = null;
    }
  });
  paused = false;
  mostrarEstado('Envío detenido por completo');
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Obfuscador Lua (usa el mismo método que obfuscatormnx)</title>
  <style>
    body {font-family:Arial;background:#111;color:#0f0;margin:20px;}
    textarea, #output {width:100%;height:250px;background:#000;color:#0f0;font-family:monospace;padding:10px;}
    button {padding:12px 20px;margin:10px;background:#0f0;color:#000;border:none;cursor:pointer;font-weight:bold;}
  </style>
</head>
<body>
  <h1>🚀 Mi Obfuscador Lua (igual que obfuscatormnx)</h1>
  <p>Pega tu script → Ofusca con XOR + Shuffle → Te da el loader listo para tu executor.</p>

  <textarea id="input" placeholder="Pega aquí tu código Lua..."></textarea><br><br>
  
  <button onclick="obfuscate()">🔒 Ofuscar Ahora</button>
  <button onclick="copyOutput()">📋 Copiar Loader</button>
  <button onclick="downloadOutput()">💾 Descargar .lua</button>

  <br><br>
  <div id="output">El loader aparecerá aquí...</div>

  <script>
    const getRandomKey = () => Math.floor(Math.random() * 255) + 1;

    function minify(code) {
      return code
        .replace(/--[^\n]*\n/g, '')
        .replace(/\/\/[^\n]*\n/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function toBytes(str) {
      return Array.from(new TextEncoder().encode(str));
    }

    function xorBytes(bytes, key) {
      return bytes.map(b => b ^ key);
    }

    function shuffle(array) {
      let a = array.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getUnshufflePositions(length) {
      let indices = Array.from({length}, (_, i) => i);
      for (let i = length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      let pos = new Array(length);
      indices.forEach((orig, idx) => pos[orig] = idx);
      return pos;
    }

    async function obfuscate() {
      let code = document.getElementById('input').value.trim();
      if (!code) return alert("¡Pega código primero!");

      const key = getRandomKey();
      const clean = minify(code);
      let bytes = toBytes(clean);
      let xored = xorBytes(bytes, key);
      let shuffled = shuffle(xored);
      let unshufflePos = getUnshufflePositions(shuffled.length);

      let byteStr = shuffled.join(',');
      let posStr = unshufflePos.join(',');

      const loader = `-- Obfuscado con MiObfuscator (mismo método que obfuscatormnx.ct.ws)
return (function()
  local bytes = {${byteStr}}
  local positions = {${posStr}}
  local key = ${key}

  local unshuffled = {}
  for i = 1, #positions do
    unshuffled[positions[i] + 1] = bytes[i]
  end

  local original = {}
  for i, b in ipairs(unshuffled) do
    original[i] = b \~ key
  end

  local script = string.char(table.unpack(original))
  return loadstring(script)()
end)()`;

      document.getElementById('output').textContent = loader;
    }

    function copyOutput() {
      const txt = document.getElementById('output').textContent;
      navigator.clipboard.writeText(txt).then(() => alert("¡Loader copiado!"));
    }

    function downloadOutput() {
      const txt = document.getElementById('output').textContent;
      const blob = new Blob([txt], {type: 'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'obfuscated.lua';
      a.click();
    }
  </script>
</body>
</html>

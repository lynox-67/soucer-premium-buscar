<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LYNOX HUB - MATRIX GREEN HACK 🧑‍💻</title>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Press+Start+2P&family=Vt323&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde-neon: #00ff41;
      --verde-lima: #39ff14;
      --verde-oscuro: #003300;
      --negro-matrix: #000000;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      height: 100%;
      overflow: hidden;
      background: var(--negro-matrix);
      color: var(--verde-neon);
      font-family: 'Vt323', monospace;
    }

    /* Video Matrix de fondo */
    #bg-video {
      position: fixed;
      right: 0;
      bottom: 0;
      min-width: 100%;
      min-height: 100%;
      z-index: -2;
      object-fit: cover;
    }

    /* Overlay Matrix rain más visible */
    #matrix-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: -1;
      background: rgba(0,0,0,0.45);
    }

    .matrix-char {
      position: absolute;
      color: var(--verde-lima);
      font-size: 18px;
      white-space: pre;
      text-shadow: 0 0 10px var(--verde-neon);
      animation: fall linear forwards;
      will-change: transform;
    }

    @keyframes fall {
      to { transform: translateY(120vh); }
    }

    /* Contenedor principal semi-transparente */
    .container {
      position: relative;
      z-index: 10;
      background: rgba(0, 20, 0, 0.75);
      backdrop-filter: blur(8px);
      border: 3px solid var(--verde-neon);
      border-radius: 16px;
      margin: 20px auto;
      padding: 30px;
      max-width: 900px;
      box-shadow: 0 0 40px rgba(0,255,65,0.5);
    }

    h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 3rem;
      text-align: center;
      color: var(--verde-lima);
      text-shadow: 0 0 20px var(--verde-neon);
      margin-bottom: 10px;
      letter-spacing: 4px;
      animation: glitch 4s infinite;
    }

    @keyframes glitch {
      0%, 100% { text-shadow: 2px 2px var(--verde-neon), -2px -2px #00aa00; }
      20% { text-shadow: -2px 2px var(--verde-neon), 2px -2px #00aa00; }
      40% { text-shadow: 2px -2px var(--verde-neon), -2px 2px #00aa00; }
    }

    .by {
      text-align: center;
      font-size: 1.4rem;
      color: #00ff4188;
      margin-bottom: 20px;
      text-shadow: 0 0 10px var(--verde-neon);
    }

    input[type="file"], textarea {
      background: #001100;
      color: var(--verde-lima);
      border: 2px solid var(--verde-neon);
      border-radius: 8px;
      padding: 12px;
      width: 100%;
      margin: 12px 0;
      font-size: 1.2rem;
    }

    button {
      background: linear-gradient(45deg, var(--verde-lima), #00aa00);
      color: black;
      border: none;
      padding: 14px 30px;
      margin: 10px;
      border-radius: 10px;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0,255,65,0.6);
      transition: all 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0,255,65,0.9);
    }

    #status {
      background: rgba(0,0,0,0.7);
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      font-size: 1.3rem;
      border-left: 6px solid var(--verde-lima);
      white-space: pre-line;
    }

    #preview {
      background: #000800;
      border: 2px dashed var(--verde-neon);
      border-radius: 10px;
      padding: 15px;
      max-height: 350px;
      overflow-y: auto;
      margin-top: 20px;
      color: var(--verde-lima);
    }

    .footer {
      text-align: center;
      color: #00ff4188;
      margin-top: 30px;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
  <source src="https://www.youtube.com/embed/R8lHaEZYpCU?autoplay=1&mute=1&loop=1&playlist=R8lHaEZYpCU&controls=0&showinfo=0&rel=0&modestbranding=1" type="video/mp4">
  Tu navegador no soporta video de fondo.
</video>

<div id="matrix-overlay"></div>

<div class="container">
  <h1>LYNOX HUB - MATRIX GREEN HACK 🧑‍💻</h1>
  <div class="by">HECHO POR LYNX EL HACKER LOCO</div>

  <p style="text-align:center; font-size:1.3rem; margin:20px 0;">
    Solo cazo https://cdn.discordapp.com/attachments/... → uno por segundo (seguro)
  </p>

  <input type="file" id="fileInput" accept=".txt" multiple>

  <label for="webhook">Webhook Discord (solo uno):</label>
  <textarea id="webhook" placeholder="https://discord.com/api/webhooks/..."></textarea>

  <div style="text-align:center; margin:30px 0;">
    <button id="startSend">INICIAR HACK 🧑‍💻</button>
    <button id="stopSend">ABORTAR 🛑</button>
  </div>

  <div id="status">Esperando infiltración... suelta los txts 💀</div>
  <div id="preview"></div>
</div>

<div class="footer">
  LYN0X HUB - GREEN MATRIX 2026 🧑‍💻💚
</div>

<script>
// Matrix rain más intenso
const matrixOverlay = document.getElementById('matrix-overlay');
const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';

function createMatrixChar() {
  const char = document.createElement('div');
  char.className = 'matrix-char';
  char.textContent = chars[Math.floor(Math.random() * chars.length)];
  char.style.left = Math.random() * 100 + 'vw';
  char.style.top = '-30px';
  char.style.animationDuration = (Math.random() * 5 + 3) + 's';
  char.style.opacity = Math.random() * 0.7 + 0.3;
  char.style.fontSize = Math.random() * 18 + 14 + 'px';
  matrixOverlay.appendChild(char);

  setTimeout(() => char.remove(), 12000);
}

setInterval(createMatrixChar, 30);

// Lógica funcional (solo cdn attachments)
let linksFiltrados = [];
let intervaloEnvio = null;
let indiceEnvio = 0;

const status = document.getElementById('status');
const preview = document.getElementById('preview');
const webhookInput = document.getElementById('webhook');

function mostrarEstado(texto, tipo = '') {
  status.textContent = texto;
  status.className = tipo;
}

function esCdnAttachment(url) {
  try {
    return url.toLowerCase().startsWith('https://cdn.discordapp.com/attachments/');
  } catch {
    return false;
  }
}

function descargarTXT() {
  if (linksFiltrados.length === 0) return;

  let contenido = `Archivos Discord CDN encontrados: ${linksFiltrados.length}\n\n`;
  linksFiltrados.forEach((url, i) => {
    contenido += `${i + 1}. ${url}\n`;
  });
  contenido += '\n──────────────────────────────\n';
  contenido += `Total: ${linksFiltrados.length}\nHecho por Lynox Hub\n`;

  const blob = new Blob([contenido], { type: 'text/plain;charset=utf-8' });
  const urlBlob = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = urlBlob;
  a.download = 'cdn_discord_files.txt';
  a.click();
  URL.revokeObjectURL(urlBlob);
}

async function procesarArchivos() {
  const input = document.getElementById('fileInput');
  if (!input.files?.length) return mostrarEstado('Suelta archivos .txt primero', 'error');

  mostrarEstado(`Extrayendo ${input.files.length} archivos...`);

  const setUrls = new Set();

  for (const file of input.files) {
    try {
      const txt = await file.text();
      const urls = txt.match(/https?:\/\/[^\s<>"'()]+/gi) || [];
      urls.forEach(u => {
        if (esCdnAttachment(u)) setUrls.add(u.trim());
      });
    } catch {}
  }

  linksFiltrados = Array.from(setUrls);

  if (linksFiltrados.length === 0) {
    mostrarEstado('No encontré ningún https://cdn.discordapp.com/attachments/', 'warning');
    preview.textContent = '';
    return;
  }

  preview.textContent = linksFiltrados.map((url, i) => `${i+1}. ${url}`).join('\n');
  mostrarEstado(`Listo: ${linksFiltrados.length} archivos encontrados`, 'success');

  descargarTXT();
}

async function enviarAlWebhook() {
  const webhook = webhookInput.value.trim();
  if (!webhook || !webhook.startsWith('https://discord.com/api/webhooks/')) {
    mostrarEstado('Webhook inválido o vacío', 'error');
    clearInterval(intervaloEnvio);
    return;
  }

  if (indiceEnvio >= linksFiltrados.length) {
    mostrarEstado(`Hack completado (${linksFiltrados.length} archivos)`, 'success');
    clearInterval(intervaloEnvio);
    intervaloEnvio = null;
    return;
  }

  const url = linksFiltrados[indiceEnvio];
  const numero = indiceEnvio + 1;
  const mensaje = `${numero}. ${url}\nHecho por Lynox Hub`;

  try {
    const res = await fetch(webhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: mensaje })
    });

    if (res.ok) {
      mostrarEstado(`Enviado ${numero}/${linksFiltrados.length}`);
    } else if (res.status === 429) {
      mostrarEstado('Rate limit detectado (429) → parando', 'warning');
      clearInterval(intervaloEnvio);
      intervaloEnvio = null;
    } else {
      mostrarEstado(`Error ${res.status}`, 'error');
      clearInterval(intervaloEnvio);
    }
  } catch (err) {
    mostrarEstado(`Fallo conexión: ${err.message}`, 'error');
    clearInterval(intervaloEnvio);
  }

  indiceEnvio++;
}

document.getElementById('fileInput').addEventListener('change', procesarArchivos);

document.getElementById('startSend').onclick = () => {
  if (linksFiltrados.length === 0) return mostrarEstado('Carga archivos primero', 'warning');
  if (intervaloEnvio) return;

  mostrarEstado('Iniciando extracción... 1 por segundo (seguro)');
  intervaloEnvio = setInterval(enviarAlWebhook, 1000);
};

document.getElementById('stopSend').onclick = () => {
  if (intervaloEnvio) {
    clearInterval(intervaloEnvio);
    intervaloEnvio = null;
  }
  mostrarEstado('Operación abortada');
};
</script>
</body>
</html>

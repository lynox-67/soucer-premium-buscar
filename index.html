<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BY LYNOX X GAEL v1 - OBFUSCATOR</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --green: #0f0;
            --green-dim: #003300;
            --text: #00ff00;
            --error: #ff0044;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            font-size: 4.2rem;
            text-shadow: 0 0 10px var(--green);
            letter-spacing: 6px;
            text-align: center;
            animation: glitch 5s infinite;
        }
        .subtitle { font-size: 1.8rem; color: #0a0; text-align: center; margin: 10px 0 30px; }
        .terminal {
            background: #001100;
            border: 2px solid var(--green);
            padding: 25px;
            box-shadow: 0 0 30px rgba(0,255,0,0.2);
            position: relative;
        }
        .drop-area {
            border: 3px dashed #004400;
            padding: 80px 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin: 30px 0;
        }
        .drop-area:hover, .drop-area.active {
            border-color: var(--green);
            background: rgba(0,50,0,0.5);
        }
        .btn {
            background: #002200;
            color: var(--green);
            border: 2px solid var(--green);
            padding: 15px 35px;
            font-size: 1.6rem;
            cursor: pointer;
            margin: 20px auto;
            display: block;
        }
        .btn:hover { background: var(--green); color: #000; }
        .status { display: none; font-size: 2rem; text-align: center; margin: 40px 0; }
        .success { color: var(--green); }
        .error { color: var(--error); }

        @keyframes glitch {
            0%,100% { text-shadow: 2px 0 #0f0, -2px 0 #f0f; }
            20% { text-shadow: -2px 0 #0f0, 2px 0 #f0f; }
            40% { text-shadow: 0 0 #0f0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>BY LYNOX X GAEL v1</h1>
    <div class="subtitle">LUA OBFUSCATOR [OFFLINE + MÁS FUERTE]</div>

    <div class="terminal">
        <div class="drop-area" id="dropArea">
            <p>[ ARRASTRA TU .lua O .txt AQUÍ ]</p>
            <p>o</p>
            <button class="btn" id="selectBtn">SELECCIONAR ARCHIVO</button>
            <input type="file" id="fileInput" accept=".lua,.txt,text/plain">
        </div>

        <div class="status" id="status">
            <span id="statusText"></span>
        </div>
    </div>
</div>

<script>
// ────────────────────────────────────────────── OBFUSCATOR MÁS FUERTE ────────

const LUA_KEYWORDS = ["and","break","do","else","elseif","end","false","for","function","if","in","local","nil","not","or","repeat","return","then","true","until","while"];

function randName(len = 24) {
    const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_";
    let s = "_$";
    for (let i = 0; i < len; i++) s += chars[Math.floor(Math.random() * chars.length)];
    return s;
}

function xorEncrypt(str, key = Math.floor(Math.random() * 220) + 35) {
    let enc = "";
    for (let i = 0; i < str.length; i++) {
        enc += String.fromCharCode(str.charCodeAt(i) ^ key);
    }
    return {data: btoa(enc), key};
}

function renameVars(code) {
    const map = new Map();
    return code.replace(/\b([a-zA-Z_][a-zA-Z0-9_]*)\b/g, (m, ...args) => {
        if (LUA_KEYWORDS.includes(m) || m.length <= 2 || m.startsWith("__")) return m;
        if (!map.has(m)) map.set(m, randName());
        return map.get(m);
    });
}

function encryptStrings(code) {
    return code.replace(/(["'])(?:(?=(\\?))\2.)*?\1/g, (match) => {
        const content = match.slice(1, -1);
        const {data, key} = xorEncrypt(content);
        return `(function(s,k)return s:gsub(".",function(c)return string.char(c:byte()~k)end)end)(base64.decode("${data}"),${key})`;
    });
}

function insertJunk(code) {
    const junk = [
        `local ${randName()}=function()for i=1,999 do if i>500 then break end end end`,
        `if math.random(1,999)>1000 then local ${randName()}=nil end`,
        `repeat local ${randName()}=0 until true`,
        `pcall(function()local a=${randName()};end)`,
        `local ${randName()}={${Math.floor(Math.random()*1e6)}}`,
    ];
    let lines = code.split('\n');
    for (let i = 0; i < 45; i++) {
        const pos = Math.floor(Math.random() * (lines.length + 1));
        lines.splice(pos, 0, junk[Math.floor(Math.random() * junk.length)]);
    }
    return lines.join('\n');
}

function fakeControlFlow(code) {
    let lines = code.split('\n');
    let out = [];
    for (let line of lines) {
        if (line.trim() && Math.random() > 0.38) {
            const cond = Math.floor(Math.random() * 99999);
            out.push(`if ${cond} == ${cond} then ${line} else local ${randName()}=false end`);
        } else {
            out.push(line);
        }
    }
    return out.join('\n');
}

function antiDumpBlock() {
    return `local _mt=getrawmetatable(_G)or{};local _old=_mt.__index;_mt.__index=function(t,k)if type(k)=="string"and(k:find"debug"or k:find"getinfo"or k=="getgc"or k:find"hook")then error("BLOCK")end;return _old and _old(t,k)or rawget(t,k)end;setrawmetatable(_G,_mt);`;
}

function obfuscateStrong(code) {
    // Orden importa: strings primero → rename después (para no romper las nuevas funciones)
    code = encryptStrings(code);
    code = renameVars(code);
    code = fakeControlFlow(code);
    code = insertJunk(code);
    code = antiDumpBlock() + "\n" + code;

    return `-- BY LYNOX X GAEL v1\n` + code;
}

// ────────────────────────────────────────────── INTERFAZ ──────────────────────

const dropArea   = document.getElementById('dropArea');
const fileInput  = document.getElementById('fileInput');
const selectBtn  = document.getElementById('selectBtn');
const status     = document.getElementById('status');
const statusText = document.getElementById('statusText');

function show(msg, isError = false) {
    statusText.textContent = msg;
    status.className = 'status ' + (isError ? 'error' : 'success');
    status.style.display = 'block';
}

selectBtn.onclick = () => fileInput.click();

dropArea.onclick = (e) => {
    if (e.target.tagName !== 'BUTTON') fileInput.click();
};

['dragover','dragenter'].forEach(ev => dropArea.addEventListener(ev, e => {
    e.preventDefault();
    dropArea.classList.add('active');
}));

['dragleave','drop'].forEach(ev => dropArea.addEventListener(ev, e => {
    e.preventDefault();
    dropArea.classList.remove('active');
}));

dropArea.addEventListener('drop', e => processFiles(e.dataTransfer.files));
fileInput.addEventListener('change', e => processFiles(e.target.files));

async function processFiles(files) {
    if (!files?.length) return;

    const file = files[0];
    if (!/\.(lua|txt)$/i.test(file.name)) {
        show('SOLO .lua o .txt', true);
        return;
    }

    show('OBFUSCANDO (versión fuerte)...');

    try {
        const original = await file.text();
        const result = obfuscateStrong(original);

        const blob = new Blob([result], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);

        const link = document.createElement('a');
        link.href = url;
        link.download = `obf_${file.name.replace(/\.[^.]+$/, '')}_${Date.now()}.lua`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);

        show('DESCARGADO → PRUÉBALO');
        setTimeout(() => status.style.display = 'none', 5000);

    } catch (err) {
        show('ERROR AL PROCESAR ARCHIVO', true);
        console.error(err);
    }
}
</script>
</body>
</html>

```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lynox Key System</title>

<style>

body{
background:#0b0b0b;
color:#00ff9d;
font-family:Arial;
text-align:center;
}

.panel{
background:#111;
padding:20px;
margin:20px auto;
width:330px;
border-radius:10px;
}

input{
padding:10px;
margin:5px;
width:80%;
}

button{
padding:10px;
background:#00ff9d;
border:none;
cursor:pointer;
}

#adminPanel{
display:none;
}

#keyPanel{
display:none;
}

</style>
</head>

<body>

<h1>Lynox Key System</h1>

<div class="panel" id="keyPanel">

<h3>Enter Key</h3>

<input id="keyInput" placeholder="Enter your key">
<br>

<button onclick="checkKey()">Verify</button>

<p id="result"></p>

</div>


<div class="panel">

<h3>Admin Login</h3>

<input type="password" id="adminPass" placeholder="Password">
<br>

<button onclick="loginAdmin()">Login</button>

<p id="loginStatus"></p>

</div>


<div class="panel" id="adminPanel">

<h3>Admin Panel</h3>

<button onclick="createKey()">Generate Key</button>

<p id="newKey"></p>

<h4>Keys List</h4>

<div id="keyList"></div>

</div>


<script>

let adminPassword = "lynoxadmin"

let keys = JSON.parse(localStorage.getItem("keys")) || {}

let deviceAuth = localStorage.getItem("deviceAuth")

if(deviceAuth == "true"){
document.getElementById("keyPanel").innerHTML = "<h3>✅ Access Granted</h3>"
}else{
document.getElementById("keyPanel").style.display = "block"
}

function saveKeys(){
localStorage.setItem("keys", JSON.stringify(keys))
}

function checkKey(){

let key = document.getElementById("keyInput").value

if(keys[key]){

if(keys[key].used == false){

keys[key].used = true

saveKeys()

localStorage.setItem("deviceAuth","true")

document.getElementById("result").innerText = "✅ Key accepted"

setTimeout(()=>{
location.reload()
},1000)

}else{

document.getElementById("result").innerText = "❌ Key already used"

}

}else{

document.getElementById("result").innerText = "❌ Invalid key"

}

updateList()

}

function loginAdmin(){

let pass = document.getElementById("adminPass").value

if(pass === adminPassword){

document.getElementById("adminPanel").style.display = "block"

document.getElementById("loginStatus").innerText = "✅ Admin logged"

}else{

document.getElementById("loginStatus").innerText = "❌ Wrong password"

}

}

function createKey(){

let key = "LYNOX-" + Math.random().toString(36).substring(2,8).toUpperCase()

keys[key] = {used:false}

saveKeys()

document.getElementById("newKey").innerText = "New Key: " + key

updateList()

}

function updateList(){

let html = ""

for(let k in keys){

html += k + " - " + (keys[k].used ? "USED ❌" : "FREE ✅") + "<br>"

}

document.getElementById("keyList").innerHTML = html

}

updateList()

</script>

</body>
</html>

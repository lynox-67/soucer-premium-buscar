<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LYNOX HUB - CAZADOR AZUL SALVAJE 🐱‍🚀</title>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Press+Start+2P&family=Vt323&display=swap" rel="stylesheet">
  <style>
    :root {
      --azul-fuerte: #0d47ff;
      --azul-electrico: #00d4ff;
      --azul-oscuro: #001f5c;
      --cian-loco: #00ffff;
      --negro-gato: #0a0a0a;
      --gris-perro: #1e1e1e;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: linear-gradient(135deg, var(--azul-oscuro), #000428);
      color: var(--cian-loco);
      font-family: 'Vt323', monospace;
      min-height: 100vh;
      padding: 20px 10px;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><text x="10" y="50" font-size="60" fill="%2300d4ff44">🐱</text></svg>'), repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,212,255,0.03) 10px, rgba(0,212,255,0.03) 20px);
      background-attachment: fixed;
    }

    h1 {
      font-family: 'Creepster', cursive;
      font-size: 3.8rem;
      text-align: center;
      color: var(--azul-electrico);
      text-shadow: 0 0 20px var(--cian-loco), 0 0 40px var(--azul-fuerte);
      margin: 20px 0 10px;
      letter-spacing: 4px;
      animation: glitch 3s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 2px var(--cian-loco), -2px -2px var(--azul-fuerte); }
      20% { text-shadow: -2px 2px var(--cian-loco), 2px -2px var(--azul-fuerte); }
      40% { text-shadow: 2px -2px var(--cian-loco), -2px 2px var(--azul-fuerte); }
      60% { text-shadow: -2px -2px var(--cian-loco), 2px 2px var(--azul-fuerte); }
      80% { text-shadow: 2px 2px var(--cian-loco), -2px -2px var(--azul-fuerte); }
      100% { text-shadow: -2px 2px var(--cian-loco), 2px -2px var(--azul-fuerte); }
    }

    .by { text-align: center; font-size: 1.6rem; color: #00ffffaa; margin-bottom: 15px; text-shadow: 0 0 10px #00ffff; font-family: 'Press Start 2P', cursive; }

    .discord { text-align: center; font-size: 1.4rem; margin: 10px 0 30px; }
    .discord a { color: #00ffff; text-decoration: none; font-weight: bold; border-bottom: 3px dashed #00ffff; padding-bottom: 4px; transition: all 0.3s; }
    .discord a:hover { color: #ff00ff; border-color: #ff00ff; text-shadow: 0 0 15px #ff00ff; }

    .container {
      background: rgba(10, 10, 40, 0.85);
      backdrop-filter: blur(8px);
      border: 4px solid var(--azul-electrico);
      border-radius: 18px;
      padding: 30px 20px;
      max-width: 1000px;
      margin: 0 auto 40px;
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.5), inset 0 0 20px rgba(0, 212, 255, 0.2);
    }

    input[type="file"], textarea, input[type="number"] {
      background: #001133;
      color: #00ffff;
      border: 2px solid #00d4ff;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Vt323', monospace;
      font-size: 1.2rem;
      width: 100%;
      margin: 12px 0;
    }

    button {
      background: linear-gradient(45deg, #00d4ff, #0d47ff);
      color: white;
      border: none;
      padding: 14px 28px;
      margin: 10px;
      border-radius: 12px;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0,212,255,0.6);
      transition: all 0.2s;
      font-family: 'Press Start 2P', cursive;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 35px rgba(0,212,255,0.9);
    }

    #startSend { background: linear-gradient(45deg, #00ff9d, #00d4ff); }
    #stopSend  { background: linear-gradient(45deg, #ff0066, #ff3366); }

    #status {
      background: rgba(0,0,0,0.6);
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      font-size: 1.3rem;
      border-left: 8px solid var(--cian-loco);
    }

    #preview {
      background: #000d22;
      border: 3px dashed #00ffff;
      border-radius: 12px;
      padding: 20px;
      font-size: 1.2rem;
      max-height: 400px;
      overflow-y: auto;
      margin-top: 25px;
      color: #aaffff;
    }

    .footer { text-align: center; font-size: 1.4rem; color: #00ffff88; margin-top: 50px; text-shadow: 0 0 10px #00ffff; }
  </style>
</head>
<body>

<div class="container">
  <h1>LYNOX HUB - CAZADOR AZUL SALVAJE 🐱‍💻🐶‍🦺</h1>
  <div class="by">HECHO POR LYNX LOCO CON GARRAS AZULES</div>
  <div class="discord">Únete al caos → <a href="https://discord.gg/spWx8vKT" target="_blank">discord.gg/spWx8vKT</a> 🐾</div>

  <p style="font-size:1.3rem; text-align:center; margin:20px 0;">
    Solo cazo imágenes y videos → nada de discord.gg → todo numerado y salvaje 🔥
  </p>

  <input type="file" id="fileInput" accept=".txt" multiple>

  <label for="webhooks">Pega tus webhooks aquí (uno por línea, máximo 5 bestias):</label>
  <textarea id="webhooks" placeholder="https://discord.com/api/webhooks/...
https://discord.com/api/webhooks/..."></textarea>

  <label for="delayMs">Velocidad de ataque (ms entre mensajes) - más bajo = más salvaje pero cuidado con ban</label>
  <input type="number" id="delayMs" value="600" min="300" max="3000" step="50">

  <div style="text-align:center; margin:30px 0;">
    <button id="startSend">LANZAR ATAQUE AZUL 🐱‍🚀</button>
    <button id="stopSend">PARAR TODO 🛑</button>
  </div>

  <div id="status">Listo para cazar... suelta los txts 🔥</div>
  <div id="preview"></div>
</div>

<div class="footer">
  LYN0X HUB - EL REY DEL AZUL SALVAJE 2026 🐾💙
</div>

<script>
let linksFiltrados = [];
let intervalos = [];
let contadores = [];

const status = document.getElementById('status');
const preview = document.getElementById('preview');
const webhooksInput = document.getElementById('webhooks');
const delayInput = document.getElementById('delayMs');

function mostrarEstado(texto, tipo = '') {
  status.textContent = texto;
  status.className = tipo;
}

function clasificarLink(url) {
  try {
    const u = new URL(url.toLowerCase());
    const path = u.pathname.toLowerCase();

    // Excluimos explícitamente cualquier enlace que contenga discord.gg
    if (url.toLowerCase().includes('discord.gg')) {
      return null;
    }

    if (/\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(path)) {
      return url.trim();
    }
    if (/\.(mp4|webm|mov|avi|mkv)$/i.test(path)) {
      return url.trim();
    }
    return null;
  } catch {
    return null;
  }
}

function descargarTXT() {
  if (linksFiltrados.length === 0) return;

  let contenido = `Enlaces filtrados (solo imágenes y videos): ${linksFiltrados.length}\n\n`;
  linksFiltrados.forEach((url, i) => {
    contenido += `${i + 1}. ${url}\n`;
  });
  contenido += '\n──────────────────────────────\n';
  contenido += `Total recolectados: ${linksFiltrados.length}\n`;
  contenido += 'Hecho por Lynox Hub\nDiscord: https://discord.gg/spWx8vKT\n';

  const blob = new Blob([contenido], { type: 'text/plain;charset=utf-8' });
  const urlBlob = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = urlBlob;
  a.download = 'enlaces_filtrados.txt';
  a.click();
  URL.revokeObjectURL(urlBlob);
}

async function procesarArchivos() {
  const input = document.getElementById('fileInput');
  if (!input.files?.length) return mostrarEstado('Selecciona archivos primero', 'error');

  mostrarEstado(`Leyendo ${input.files.length} archivo(s)...`);

  const setUrls = new Set();
  for (const file of input.files) {
    try {
      const txt = await file.text();
      const urls = txt.match(/https?:\/\/[^\s<>"'()]+/gi) || [];
      urls.forEach(u => setUrls.add(u.trim()));
    } catch {}
  }

  linksFiltrados = Array.from(setUrls).map(clasificarLink).filter(Boolean);

  if (linksFiltrados.length === 0) {
    mostrarEstado('No se encontraron imágenes ni videos válidos', 'warning');
    preview.textContent = '';
    return;
  }

  preview.textContent = linksFiltrados.map((url, i) => `${i+1}. ${url}`).join('\n');
  mostrarEstado(`Listo: ${linksFiltrados.length} enlaces filtrados (sin discord.gg)`, 'success');

  descargarTXT();
}

async function enviarParte(webhook, parteLinks, parteIndex) {
  let localIndex = 0;
  const delay = parseInt(delayInput.value) || 600;

  const intervalo = setInterval(async () => {
    if (localIndex >= parteLinks.length) {
      clearInterval(intervalo);
      intervalos[parteIndex] = null;
      mostrarEstado(`Webhook ${parteIndex + 1} terminado (${parteLinks.length} mensajes)`);
      return;
    }

    const url = parteLinks[localIndex];
    const numeroGlobal = parteIndex * Math.ceil(linksFiltrados.length / 5) + localIndex + 1;
    const mensaje = `${numeroGlobal}. ${url}\nHecho por Lynox Hub`;

    try {
      const res = await fetch(webhook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: mensaje })
      });

      if (res.ok) {
        // éxito silencioso
      } else if (res.status === 429) {
        mostrarEstado(`Rate limit en webhook ${parteIndex + 1} → parando ese webhook`, 'warning');
        clearInterval(intervalo);
        intervalos[parteIndex] = null;
        return;
      } else {
        mostrarEstado(`Error ${res.status} en webhook ${parteIndex + 1}`, 'error');
        clearInterval(intervalo);
        intervalos[parteIndex] = null;
        return;
      }
    } catch (err) {
      mostrarEstado(`Fallo conexión webhook ${parteIndex + 1}: ${err.message}`, 'error');
      clearInterval(intervalo);
      intervalos[parteIndex] = null;
      return;
    }

    localIndex++;
  }, delay);

  intervalos[parteIndex] = intervalo;
}

document.getElementById('fileInput').addEventListener('change', procesarArchivos);

document.getElementById('startSend').onclick = () => {
  if (linksFiltrados.length === 0) return mostrarEstado('Primero carga y filtra enlaces', 'warning');

  const webhooksText = webhooksInput.value.trim();
  if (!webhooksText) return mostrarEstado('Pega al menos un webhook', 'error');

  const webhooks = webhooksText.split('\n').map(w => w.trim()).filter(w => w.startsWith('https://discord.com/api/webhooks/'));

  if (webhooks.length === 0) return mostrarEstado('Ningún webhook válido detectado', 'error');
  if (webhooks.length > 5) mostrarEstado('Más de 5 webhooks → usando solo los primeros 5', 'warning');

  const usados = webhooks.slice(0, 5);
  const porWebhook = Math.ceil(linksFiltrados.length / usados.length);
  intervalos = new Array(usados.length).fill(null);

  mostrarEstado(`Iniciando envío dividido en ${usados.length} webhooks...`);

  usados.forEach((webhook, i) => {
    const inicio = i * porWebhook;
    const fin = Math.min(inicio + porWebhook, linksFiltrados.length);
    const parte = linksFiltrados.slice(inicio, fin);
    if (parte.length > 0) {
      enviarParte(webhook, parte, i);
    }
  });
};

document.getElementById('stopSend').onclick = () => {
  intervalos.forEach(int => {
    if (int) clearInterval(int);
  });
  intervalos = [];
  mostrarEstado('Todos los envíos detenidos');
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Extraer y abrir Imágenes / Videos / Discord - Lynox Hub</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 30px auto; padding: 0 20px; background: #f9fafb; color: #111; line-height: 1.6; }
    h1 { color: #1d4ed8; text-align: center; }
    .by { text-align: center; color: #666; margin-bottom: 1rem; }
    .discord { text-align: center; color: #5865f2; font-weight: bold; margin: 0.5rem 0 1.5rem; }
    .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    button { padding: 0.8rem 1.5rem; margin: 0.5rem; border: none; border-radius: 8px; font-size: 1.05rem; cursor: pointer; }
    #startSeq { background: #22c55e; color: white; }
    #startAuto { background: #eab308; color: white; }
    #stopBtn  { background: #ef4444; color: white; }
    #status { margin: 1rem 0; font-weight: 600; min-height: 1.5em; }
    .success { color: #15803d; }
    .warning { color: #b45309; }
    .error   { color: #b91c1c; }
    #preview { margin-top: 1.5rem; padding: 1rem; background: #f1f5f9; border-radius: 8px; white-space: pre-wrap; font-family: monospace; font-size: 0.95rem; max-height: 300px; overflow-y: auto; }
    .footer { text-align: center; margin-top: 2rem; color: #666; }
  </style>
</head>
<body>

<div class="container">
  <h1>Extraer y abrir enlaces (Imágenes / Videos / Discord)</h1>
  <div class="by">Hecho por Lynox Hub</div>
  <div class="discord">Discord: <a href="https://discord.gg/spWx8vKT" target="_blank">https://discord.gg/spWx8vKT</a></div>

  <p>Sube .txt → filtra solo imágenes, videos y discord.gg → abre uno por uno o automático (cuidado con popup blocker)</p>

  <input type="file" id="fileInput" accept=".txt" multiple>

  <div style="margin: 1.5rem 0;">
    <button id="startSeq">Iniciar secuencial (uno por click)</button>
    <button id="startAuto">Auto cada 2 segundos</button>
    <button id="stopBtn">Parar / Limpiar</button>
  </div>

  <div id="status"></div>
  <div id="preview"></div>

  <div class="footer">Lynox Hub • Discord: https://discord.gg/spWx8vKT</div>
</div>

<script>
let linksFiltrados = [];
let intervaloActual = null;
let indiceActual = 0;
let pestañasAbiertas = [];

const status = document.getElementById('status');
const preview = document.getElementById('preview');

function mostrarEstado(texto, tipo = '') {
  status.textContent = texto;
  status.className = tipo;
}

function clasificarLink(url) {
  try {
    const u = new URL(url.toLowerCase());
    const path = u.pathname.toLowerCase();
    const host = u.hostname.toLowerCase();

    if (host.includes('discord.gg') || host.includes('discord.com/invite') || host.includes('discordapp.com')) {
      return { tipo: 'Discord', texto: `[Discord] **Únete →** ${url}` };
    }
    if (/\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(path)) {
      return { tipo: 'Imagen', texto: `[Imagen] ${url}` };
    }
    if (/\.(mp4|webm|mov|avi|mkv)$/i.test(path)) {
      return { tipo: 'Video', texto: `[Video] ${url}` };
    }
    return null;
  } catch {
    return null;
  }
}

async function cargarArchivos() {
  const input = document.getElementById('fileInput');
  if (!input.files?.length) return mostrarEstado('Selecciona al menos un .txt', 'error');

  mostrarEstado(`Leyendo ${input.files.length} archivo(s)...`);

  const setUrls = new Set();

  for (const file of input.files) {
    try {
      const txt = await file.text();
      const urls = txt.match(/https?:\/\/[^\s<>"'()]+/gi) || [];
      urls.forEach(u => setUrls.add(u.trim()));
    } catch {}
  }

  linksFiltrados = Array.from(setUrls)
    .map(url => clasificarLink(url))
    .filter(Boolean);

  if (linksFiltrados.length === 0) {
    mostrarEstado('No se encontraron enlaces válidos (solo img/video/discord)', 'warning');
    preview.textContent = '';
    return;
  }

  preview.textContent = linksFiltrados.map(item => item.texto).join('\n\n');
  mostrarEstado(`Listo → ${linksFiltrados.length} enlaces filtrados`, 'success');
  indiceActual = 0;
}

function abrirSiguiente() {
  if (indiceActual >= linksFiltrados.length) {
    mostrarEstado('Todos los enlaces abiertos', 'success');
    clearInterval(intervaloActual);
    intervaloActual = null;
    return;
  }

  const url = linksFiltrados[indiceActual].texto.match(/https?:\/\/[^\s]+/)[0];
  const win = window.open(url, '_blank');
  
  if (win) {
    pestañasAbiertas.push(win);
    mostrarEstado(`Abriendo ${indiceActual + 1}/${linksFiltrados.length} → ${url.substring(0,60)}...`);
  } else {
    mostrarEstado('Popup bloqueado → permite popups para este sitio', 'error');
    clearInterval(intervaloActual);
    intervaloActual = null;
  }

  indiceActual++;
}

document.getElementById('fileInput').addEventListener('change', cargarArchivos);

document.getElementById('startSeq').onclick = () => {
  if (linksFiltrados.length === 0) return mostrarEstado('Primero carga archivos', 'warning');
  abrirSiguiente();  // uno por click
};

document.getElementById('startAuto').onclick = () => {
  if (linksFiltrados.length === 0) return mostrarEstado('Primero carga archivos', 'warning');
  if (intervaloActual) return;

  mostrarEstado('Modo automático cada 2 segundos (puede bloquearse)');
  intervaloActual = setInterval(abrirSiguiente, 2000);
};

document.getElementById('stopBtn').onclick = () => {
  if (intervaloActual) {
    clearInterval(intervaloActual);
    intervaloActual = null;
  }
  mostrarEstado('Parado. Puedes seguir manual o recargar página para limpiar pestañas.');
  // Nota: no se pueden cerrar automáticamente pestañas abiertas por JS por seguridad
};
</script>
</body>
</html>

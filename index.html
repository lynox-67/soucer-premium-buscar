```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lynox Key System</title>

<style>

body{
background:#0a0a0a;
color:#00ff9d;
font-family:Arial;
text-align:center;
}

.panel{
background:#111;
padding:20px;
margin:20px auto;
width:350px;
border-radius:12px;
box-shadow:0 0 10px #00ff9d33;
}

input{
padding:10px;
margin:5px;
width:85%;
background:#000;
border:1px solid #00ff9d;
color:#00ff9d;
}

button{
padding:10px 15px;
margin:5px;
background:#00ff9d;
border:none;
cursor:pointer;
font-weight:bold;
}

#adminPanel{
display:none;
}

#keyPanel{
display:none;
}

</style>
</head>

<body>

<h1>Lynox Key System</h1>

<div class="panel" id="accessPanel">
<h3>Device Access</h3>
<p id="accessStatus"></p>
<button onclick="logoutDevice()">Reset Device Access</button>
</div>

<div class="panel" id="keyPanel">

<h3>Enter Key</h3>

<input id="keyInput" placeholder="Enter your key">

<br>

<button onclick="checkKey()">Verify Key</button>

<p id="result"></p>

</div>

<div class="panel">

<h3>Admin Login</h3>

<input type="password" id="adminPass" placeholder="Admin Password">

<br>

<button onclick="loginAdmin()">Login</button>

<p id="loginStatus"></p>

</div>

<div class="panel" id="adminPanel">

<h3>Admin Panel</h3>

<button onclick="createKey()">Generate Key</button>

<p id="newKey"></p>

<h4>Keys Database</h4>

<div id="keyList"></div>

</div>

<script>

let adminPassword = "lynoxadmin"

let keys = JSON.parse(localStorage.getItem("keys")) || {}

let deviceAuth = localStorage.getItem("deviceAuth")

function saveKeys(){
localStorage.setItem("keys", JSON.stringify(keys))
}

function updateAccess(){

if(deviceAuth == "true"){

document.getElementById("accessStatus").innerHTML = "✅ Device Authorized"

document.getElementById("keyPanel").style.display = "none"

}else{

document.getElementById("accessStatus").innerHTML = "❌ Device Not Authorized"

document.getElementById("keyPanel").style.display = "block"

}

}

function logoutDevice(){

localStorage.removeItem("deviceAuth")

location.reload()

}

function checkKey(){

let key = document.getElementById("keyInput").value

if(keys[key]){

if(keys[key].used == false){

keys[key].used = true

saveKeys()

localStorage.setItem("deviceAuth","true")

document.getElementById("result").innerText = "✅ Key Accepted"

setTimeout(()=>{
location.reload()
},1000)

}else{

document.getElementById("result").innerText = "❌ Key Already Used"

}

}else{

document.getElementById("result").innerText = "❌ Invalid Key"

}

updateList()

}

function loginAdmin(){

let pass = document.getElementById("adminPass").value

if(pass === adminPassword){

document.getElementById("adminPanel").style.display = "block"

document.getElementById("loginStatus").innerText = "✅ Admin Logged"

}else{

document.getElementById("loginStatus").innerText = "❌ Wrong Password"

}

}

function createKey(){

let key = "LYNOX-" + Math.random().toString(36).substring(2,10).toUpperCase()

keys[key] = {used:false}

saveKeys()

document.getElementById("newKey").innerText = "New Key: " + key

updateList()

}

function updateList(){

let html = ""

for(let k in keys){

html += k + " - " + (keys[k].used ? "USED ❌" : "FREE ✅") + "<br>"

}

document.getElementById("keyList").innerHTML = html

}

updateAccess()

updateList()

</script>

</body>
</html>
```

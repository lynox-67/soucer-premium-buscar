<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LYNOX HUB - RENOMBRADOR INTELIGENTE DE TXT 🧑‍💻</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 30px;
      min-height: 100vh;
    }
    h1 {
      color: #58a6ff;
      text-align: center;
      margin-bottom: 40px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #161b22;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    input[type="file"] {
      display: block;
      margin: 20px auto;
      padding: 12px;
      background: #21262d;
      color: #c9d1d9;
      border: 2px solid #30363d;
      border-radius: 8px;
      width: 100%;
      max-width: 600px;
    }
    button {
      background: #238636;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 1.1rem;
      border-radius: 8px;
      cursor: pointer;
      display: block;
      margin: 30px auto;
      transition: background 0.2s;
    }
    button:hover {
      background: #2ea043;
    }
    #status {
      text-align: center;
      font-size: 1.2rem;
      margin: 20px 0;
      min-height: 1.5em;
    }
    .success { color: #56d364; }
    .error   { color: #f85149; }
    .warning { color: #ffa657; }
  </style>
</head>
<body>

<div class="container">
  <h1>RENOMBRADOR INTELIGENTE DE TXT</h1>
  <p style="text-align:center; margin-bottom:30px;">
    Sube varios .txt → si el nombre es raro o vacío, busca dentro del archivo un título útil y lo renombra
  </p>

  <input type="file" id="fileInput" accept=".txt,text/plain" multiple>

  <button onclick="procesarArchivos()">PROCESAR Y DESCARGAR ARCHIVOS RENOMBRADOS</button>

  <div id="status"></div>
</div>

<script>
// Función para decidir si un nombre es "al azar" o inválido
function esNombreRaro(nombre) {
  if (!nombre || nombre.trim() === '') return true;
  
  // Quitar extensión si existe
  nombre = nombre.replace(/\.[^/.]+$/, "").trim();

  // Muy corto o solo números/letras raras
  if (nombre.length < 3) return true;

  // Solo caracteres especiales o basura
  const basura = /^[-_.,!@#$%^&*()+=[\]{}|;:'",.<>?/\\`~ ]+$/;
  if (basura.test(nombre)) return true;

  // Solo números o letras repetidas
  if (/^(.)\1+$/.test(nombre)) return true;

  return false;
}

// Busca la primera línea que parezca un título útil
function buscarTituloEnContenido(texto) {
  const lineas = texto.split('\n').map(l => l.trim()).filter(l => l.length > 0);

  for (let linea of lineas) {
    // Evitamos enlaces como título
    if (linea.startsWith('http') || linea.startsWith('https')) continue;

    // Buscamos líneas que parezcan títulos (más de 5 caracteres, no muy largas)
    if (linea.length >= 5 && linea.length <= 80) {
      // Quitamos caracteres raros del principio/final
      linea = linea.replace(/^[^a-zA-Z0-9áéíóúñÁÉÍÓÚÑ¿¡]+/, '')
                   .replace(/[^a-zA-Z0-9áéíóúñÁÉÍÓÚÑ¿¡]+$/, '')
                   .trim();
      
      if (linea.length >= 5) {
        // Limpiamos para que sea un nombre válido de archivo
        return linea
          .replace(/[<>:"\/\\|?*]/g, '')     // caracteres inválidos en nombres
          .replace(/\s+/g, '_')               // espacios a guiones bajos
          .substring(0, 80);                  // máximo 80 caracteres
      }
    }
  }

  // Si no encontró nada útil, usa un nombre genérico con fecha/hora
  const ahora = new Date();
  return `Documento_${ahora.getHours()}-${ahora.getMinutes()}_${ahora.getSeconds()}`;
}

async function procesarArchivos() {
  const input = document.getElementById('fileInput');
  const status = document.getElementById('status');

  if (!input.files || input.files.length === 0) {
    status.textContent = 'Selecciona al menos un archivo .txt';
    status.className = 'error';
    return;
  }

  status.textContent = `Procesando ${input.files.length} archivo(s)...`;
  status.className = '';

  for (const file of input.files) {
    try {
      const contenido = await file.text();
      let nombreFinal = file.name;

      // Si el nombre es raro o vacío → buscar dentro
      if (esNombreRaro(file.name)) {
        nombreFinal = buscarTituloEnContenido(contenido);
      }

      // Limpiar nombre final para que sea válido como archivo
      nombreFinal = nombreFinal
        .replace(/\.[^/.]+$/, '')           // quitar extensión anterior
        .replace(/[^a-zA-Z0-9áéíóúñÁÉÍÓÚÑ¿¡_ -]/g, '_')
        .trim();

      if (!nombreFinal) nombreFinal = 'Documento_sin_nombre';

      // Agregar extensión .txt
      nombreFinal += '.txt';

      // Crear nuevo blob con el contenido original
      const blob = new Blob([contenido], { type: 'text/plain;charset=utf-8' });
      const urlBlob = URL.createObjectURL(blob);

      // Descargar
      const a = document.createElement('a');
      a.href = urlBlob;
      a.download = nombreFinal;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(urlBlob);

    } catch (err) {
      console.error('Error procesando archivo:', file.name, err);
    }
  }

  status.textContent = `¡Listo! Se descargaron ${input.files.length} archivo(s) renombrados.`;
  status.className = 'success';
}
</script>
</body>
</html>

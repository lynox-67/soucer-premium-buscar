<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYNOX x GAEL • OBFUSCATOR EXTREMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0a0a0a, #1a1a2e); }
        .gold { color: #ffd700; text-shadow: 0 0 15px #ffd700; }
        .card { background: rgba(15, 23, 42, 0.92); border: 2px solid #ffd700; }
        textarea { resize: vertical; min-height: 180px; }
    </style>
</head>
<body class="min-h-screen text-white font-mono">
    <div class="max-w-4xl mx-auto pt-10 pb-20 px-4">
        <div class="text-center mb-10">
            <h1 class="text-5xl md:text-6xl font-bold tracking-wider gold mb-3">LYNOX<span class="text-white"> x </span>GAEL</h1>
            <p class="text-xl text-amber-300">Obfuscador extremo • 100% offline • Seguro</p>
        </div>

        <div class="card rounded-3xl p-8 md:p-10 shadow-2xl">
            <!-- Área para pegar texto -->
            <div class="mb-8">
                <label class="block text-lg gold font-semibold mb-2">Pega tu script aquí:</label>
                <textarea id="textInput" class="w-full bg-gray-900 border border-amber-600 rounded-xl p-4 text-gray-200 font-mono text-sm focus:outline-none focus:border-amber-400" placeholder="-- Pega tu código Lua/Luau aquí..."></textarea>
            </div>

            <!-- O archivo -->
            <div class="mb-8">
                <label class="block text-lg gold font-semibold mb-2">O sube un archivo:</label>
                <div id="dropzone" class="border-3 border-dashed border-amber-500 rounded-2xl p-10 text-center cursor-pointer transition hover:border-amber-300 hover:bg-white/5">
                    <input type="file" id="fileInput" accept=".lua,.txt,.luau" class="hidden">
                    <div class="text-5xl mb-4">📤</div>
                    <p class="text-xl gold">Arrastra o haz clic para seleccionar archivo</p>
                    <p class="text-sm text-gray-500 mt-3">.lua • .txt • .luau</p>
                </div>
            </div>

            <!-- Botón principal -->
            <button id="obfuscateBtn" class="w-full bg-gradient-to-r from-amber-600 to-yellow-600 hover:from-amber-500 hover:to-yellow-500 text-white font-bold py-4 px-8 rounded-xl text-xl transition shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
                OFUSCAR AHORA
            </button>

            <!-- Estado -->
            <div id="status" class="hidden mt-6 text-center">
                <div class="inline-flex items-center gap-3 text-amber-400">
                    <div class="w-6 h-6 border-4 border-amber-400 border-t-transparent rounded-full animate-spin"></div>
                    <span class="font-bold text-lg" id="statusText">Procesando...</span>
                </div>
            </div>
        </div>

        <div class="text-center mt-10 text-sm text-gray-600">
            BY LYNOX X GAEL • Todo se procesa en tu navegador • Nada se envía
        </div>
    </div>

    <script>
        const keywords = ["and","break","do","else","elseif","end","false","for","function","if","in","local","nil","not","or","repeat","return","then","true","until","while"];

        function generateRandomName() {
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_";
            let name = "_";
            for (let i = 0; i < 28; i++) name += chars[Math.floor(Math.random() * chars.length)];
            return name;
        }

        function renameVariables(code) {
            const varMap = new Map();
            return code.replace(/\b([a-zA-Z_][a-zA-Z0-9_]*)\b/g, (m) => {
                if (keywords.includes(m) || m.length < 3 || m.startsWith("__")) return m;
                if (!varMap.has(m)) varMap.set(m, generateRandomName());
                return varMap.get(m);
            });
        }

        function addControlFlow(code) {
            return code.split('\n').map(line => {
                if (line.trim() && Math.random() > 0.4) {
                    return `if ${Math.floor(Math.random()*99999)+10000} == ${Math.floor(Math.random()*99999)+10000} then ${line} else local ${generateRandomName()} = 0 end`;
                }
                return line;
            }).join('\n');
        }

        function addJunk(code) {
            const junk = [
                `local ${generateRandomName()} = function() for _=1,math.huge do break end end`,
                `repeat local ${generateRandomName()}=0 until false`,
                `local ${generateRandomName()} = {${Math.floor(Math.random()*999999)}}`,
                `pcall(function() local x=debug.traceback() end)`,
            ];
            for (let i = 0; i < 35; i++) {
                code = junk[Math.floor(Math.random() * junk.length)] + "\n" + code;
            }
            return code;
        }

        function addAntiDumper() {
            return `-- ANTI-DUMPER + ANTI-HOOK
local mt = getrawmetatable(game) or {}
local old = mt.__index
mt.__index = function(t,k)
    if (typeof k === "string" && (k:find("debug") or k=="getgc" or k=="dump")) then
        error("ANTI-DUMPER ACTIVADO")
    end
    return old(t,k)
end
setrawmetatable(game, mt)
if hookmetamethod then hookmetamethod(game,"__index",function() error("BLOCKED") end) end
`;
        }

        function obfuscate(code) {
            if (!code.trim()) return "";
            let result = renameVariables(code);
            result = addControlFlow(result);
            result = addJunk(result);
            result = addAntiDumper() + result;
            return `-- BY LYNOX X GAEL\n` + result;
        }

        // Interfaz
        const textInput = document.getElementById('textInput');
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const btn = document.getElementById('obfuscateBtn');
        const status = document.getElementById('status');
        const statusText = document.getElementById('statusText');

        let currentFile = null;
        let currentText = "";

        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('border-amber-300', 'bg-white/5'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('border-amber-300', 'bg-white/5'));
        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            dropzone.classList.remove('border-amber-300', 'bg-white/5');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', e => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            if (!file.name.toLowerCase().match(/\.(lua|txt|luau)$/)) {
                alert('Solo archivos .lua, .txt o .luau');
                return;
            }
            currentFile = file;
            textInput.value = "Archivo cargado: " + file.name + "\n(Procesando al presionar el botón)";
            textInput.disabled = true;
        }

        btn.addEventListener('click', async () => {
            let source = "";

            if (currentFile) {
                try {
                    source = await currentFile.text();
                } catch (e) {
                    alert('Error al leer el archivo');
                    return;
                }
            } else {
                source = textInput.value.trim();
            }

            if (!source) {
                alert('Pega texto o sube un archivo primero');
                return;
            }

            btn.disabled = true;
            status.classList.remove('hidden');
            statusText.textContent = 'Ofuscando...';

            setTimeout(() => {  // Pequeño delay para que se vea la animación
                const result = obfuscate(source);

                const blob = new Blob([result], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `obf_lynox_x_gael_${Date.now()}.lua`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                statusText.innerHTML = '✅ Listo • Descargado';
                btn.disabled = false;
                currentFile = null;
                textInput.disabled = false;
                textInput.value = "";
                setTimeout(() => status.classList.add('hidden'), 2500);
            }, 600);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ofuscador Lua - LYNOX X GAEL Edition</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0d1117; color:#e6edf3; padding:20px; max-width:1000px; margin:auto; }
    h1 { color:#58a6ff; text-align:center; }
    textarea { width:100%; height:220px; background:#161b22; color:#c9d1d9; border:1px solid #30363d; border-radius:8px; padding:12px; font-family:Consolas,monospace; margin:15px 0; }
    button { padding:12px 24px; margin:10px; background:#238636; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
    button:hover { background:#2ea043; }
    #ofuscarBtn { background:#6e40c9; }
    #limpiarBtn { background:#da3633; }
    #resultado { background:#0e4429; border-color:#238636; }
    .instruccion { background:#21262d; padding:15px; border-radius:8px; margin:20px 0; border-left:4px solid #58a6ff; }
  </style>
</head>
<body>
  <h1>Ofuscador Lua MNX - Powered by LYNOX X GAEL</h1>

  <div class="instruccion">
    <strong>Paso 1:</strong> Pega tu código Lua original abajo.<br>
    <strong>Paso 2:</strong> Presiona "Ofuscar en Monsy" → se abre el obfuscador.<br>
    <strong>Paso 3:</strong> Ofusca → copia el resultado ofuscado → pégalo en el segundo cuadro y presiona "Limpiar y Cambiar Marca".
  </div>

  <label><strong>1. Tu código Lua original:</strong></label>
  <textarea id="original" placeholder="Pega aquí tu script Lua sin ofuscar..."></textarea>

  <button id="ofuscarBtn">Ofuscar en Monsy →</button>

  <label><strong>2. Pega aquí el código ya ofuscado (del otro sitio):</strong></label>
  <textarea id="ofuscado" placeholder="Pega el output ofuscado aquí..."></textarea>

  <div>
    <button id="limpiarBtn">Quitar Monsy</button>
    <button id="cambiarBtn">Cambiar a LYNOX X GAEL</button>
    <button id="copiarFinal">Copiar resultado final</button>
  </div>

  <label><strong>Resultado final (listo para usar):</strong></label>
  <textarea id="resultado" readonly placeholder="Aquí aparecerá el código limpio con tu marca..."></textarea>

  <script>
    const original = document.getElementById('original');
    const ofuscadoInput = document.getElementById('ofuscado');
    const resultado = document.getElementById('resultado');

    document.getElementById('ofuscarBtn').onclick = () => {
      const code = original.value.trim();
      if (!code) return alert('Pega tu código primero!');
      
      const url = 'https://obfuscatormnx.ct.ws/?i=1';
      window.open(url, '_blank');  // Abre en nueva pestaña
      alert('Se abrió el obfuscador. Ofusca tu código y copia el resultado.');
    };

    function procesar(tipo) {
      let texto = ofuscadoInput.value.trim();
      if (!texto) return alert('Pega el código ofuscado primero!');

      // Patrones para eliminar/reemplazar Monsy (agrega más si ves otros)
      const patrones = [
        /--\s*Protected by Monsy Obfuscator/gi,
        /--\s*Protected by Monsy/gi,
        /--\s*Monsy/gi,
        /--\s*By Monsy/gi,
        /Monsy/gi,
        /mnx/gi,
        /@ Monsy/gi
      ];

      let limpio = texto;
      patrones.forEach(p => {
        if (tipo === 'cambiar') {
          limpio = limpio.replace(p, '-- Protected by LYNOX X GAEL');
        } else {
          limpio = limpio.replace(p, '');
        }
      });

      limpio = limpio.replace(/\n\s*\n+/g, '\n').trim(); // Limpia líneas vacías

      resultado.value = limpio;
      resultado.scrollIntoView({behavior: 'smooth'});
      alert(tipo === 'cambiar' ? '¡Marca cambiada a LYNOX X GAEL!' : '¡Referencias a Monsy eliminadas!');
    }

    document.getElementById('cambiarBtn').onclick = () => procesar('cambiar');
    document.getElementById('limpiarBtn').onclick = () => procesar('quitar');

    document.getElementById('copiarFinal').onclick = () => {
      if (!resultado.value) return alert('No hay resultado');
      resultado.select();
      navigator.clipboard.writeText(resultado.value);
      alert('¡Copiado!');
    };
  </script>
</body>
</html>

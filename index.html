<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Enviar Scripts y TXT por Webhooks (sin imágenes/videos)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #1e1e1e; color: #e0e0e0; }
    input, button { margin: 10px 0; padding: 8px; }
    button { background: #5865f2; color: white; border: none; cursor: pointer; }
    button:disabled { background: #3f3f3f; }
    #status { color: #43b581; font-weight: bold; }
    #error { color: #f04747; }
    h2 { color: #fff; }
  </style>
</head>
<body>
  <h2>Enviar Archivos de Carpeta a Webhooks (solo TXT, LUA, etc. – sin imágenes ni videos)</h2>
  
  <p>1. Pega las URLs de los webhooks (separadas por coma):</p>
  <input type="text" id="webhooks" size="90" placeholder="https://discord.com/api/webhooks/ID1/TOKEN1, https://discord.com/api/webhooks/ID2/TOKEN2"><br>
  
  <p>2. Selecciona la carpeta completa:</p>
  <input type="file" id="folder" webkitdirectory directory multiple><br>
  
  <p>3. Delay entre envíos (ms) – recomendado 800–2000 para evitar bans/ratelimits:</p>
  <input type="number" id="delay" value="1200" min="0" step="100"><br>
  
  <button id="startBtn" onclick="iniciarEnvio()">Comenzar Envío</button>
  <button id="stopBtn" onclick="detenerEnvio()" disabled>Detener Envío</button>
  
  <p id="status">Listo para empezar...</p>
  <p id="error"></p>

  <script>
    let enviando = false;
    let archivosPendientes = [];
    let enviados = new Set(); // Evitar duplicados por nombre de archivo
    let indexActual = 0;
    let webhooks = [];
    let delayMs = 1200;

    // Extensiones permitidas (solo texto/scripts – agrega/quita según necesites)
    const extensionesPermitidas = new Set([
      '.txt', '.lua', '.json', '.js', '.css', '.html', '.log', '.cfg', '.ini', '.xml'
    ]);

    async function iniciarEnvio() {
      const webhooksInput = document.getElementById('webhooks').value.trim();
      delayMs = parseInt(document.getElementById('delay').value) || 1200;
      const folderInput = document.getElementById('folder');

      if (!webhooksInput) return mostrarError('Ingresa al menos un webhook.');
      webhooks = webhooksInput.split(',').map(u => u.trim()).filter(u => u.startsWith('https://discord.com/api/webhooks/'));

      if (webhooks.length === 0) return mostrarError('Ningún webhook válido.');
      if (folderInput.files.length === 0) return mostrarError('Selecciona una carpeta.');

      // Filtrar solo archivos permitidos y no duplicados
      archivosPendientes = Array.from(folderInput.files).filter(file => {
        const ext = file.name.toLowerCase().slice(file.name.lastIndexOf('.'));
        return extensionesPermitidas.has(ext) && !enviados.has(file.name);
      });

      if (archivosPendientes.length === 0) return mostrarError('No hay archivos válidos nuevos (solo txt/lua/etc).');

      enviando = true;
      document.getElementById('startBtn').disabled = true;
      document.getElementById('stopBtn').disabled = false;
      mostrarStatus(`Preparando ${archivosPendientes.length} archivos...`);

      indexActual = 0;
      await procesarEnvio();
    }

    async function procesarEnvio() {
      while (enviando && indexActual < archivosPendientes.length) {
        const file = archivosPendientes[indexActual];
        const webhookIdx = indexActual % webhooks.length;
        const webhook = webhooks[webhookIdx];

        mostrarStatus(`[${indexActual+1}/${archivosPendientes.length}] Enviando ${file.name} → webhook ${webhookIdx+1}`);

        const formData = new FormData();
        formData.append('payload_json', JSON.stringify({
          content: `**Archivo:** ${file.name}\n**Tamaño:** ${Math.round(file.size / 1024)} KB`
        }));
        formData.append('files[]', file);

        try {
          const res = await fetch(webhook, { method: 'POST', body: formData });
          if (res.ok) {
            enviados.add(file.name);
            mostrarStatus(`Éxito: ${file.name} enviado`);
          } else {
            mostrarError(`Fallo ${res.status} en ${file.name}`);
          }
        } catch (err) {
          mostrarError(`Error en ${file.name}: ${err.message}`);
        }

        indexActual++;
        if (enviando && indexActual < archivosPendientes.length) {
          await new Promise(r => setTimeout(r, delayMs));
        }
      }

      if (enviando) {
        mostrarStatus(`¡Terminado! Enviados ${enviados.size} archivos.`);
      } else {
        mostrarStatus('Envío detenido manualmente.');
      }
      resetBotones();
    }

    function detenerEnvio() {
      enviando = false;
      mostrarStatus('Deteniendo... (esperando envío actual)');
    }

    function resetBotones() {
      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
    }

    function mostrarStatus(msg) {
      document.getElementById('status').textContent = msg;
      document.getElementById('error').textContent = '';
    }

    function mostrarError(msg) {
      document.getElementById('error').textContent = msg;
      document.getElementById('status').textContent = '';
    }
  </script>
</body>
</html>

<script>
    const uploadBtn = document.getElementById('uploadBtn');
    const stopBtn = document.getElementById('stopBtn');
    const folderInput = document.getElementById('folder');
    const webhooksInput = document.getElementById('webhooks');
    const statusDiv = document.getElementById('status');
    const errorDiv = document.getElementById('error');

    let abortController = null;

    uploadBtn.addEventListener('click', async () => {
        const files = Array.from(folderInput.files);
        let webhookUrls = webhooksInput.value.split(',').map(url => url.trim()).filter(url => url);

        if (files.length === 0) return errorDiv.textContent = 'Selecciona carpeta con archivos.';
        if (webhookUrls.length === 0) return errorDiv.textContent = 'Ingresa al menos un webhook.';

        errorDiv.textContent = '';
        statusDiv.textContent = 'Iniciando...';
        uploadBtn.disabled = true;
        stopBtn.disabled = false;
        abortController = new AbortController();

        try {
            const chunks = Array(webhookUrls.length).fill().map(() => []);
            files.forEach((file, i) => chunks[i % webhookUrls.length].push(file));

            await Promise.all(
                chunks.map((chunk, i) => sendToWebhook(webhookUrls[i], chunk, abortController.signal))
            );
            statusDiv.textContent = '¡Envío completado!';
        } catch (err) {
            if (err.name === 'AbortError') {
                statusDiv.textContent = 'Detenido por el usuario.';
            } else {
                errorDiv.textContent = `Error: ${err.message}`;
            }
        } finally {
            uploadBtn.disabled = false;
            stopBtn.disabled = true;
            abortController = null;
        }
    });

    stopBtn.addEventListener('click', () => {
        abortController?.abort();
        uploadBtn.disabled = false;
        stopBtn.disabled = true;
    });

    async function sendToWebhook(url, files, signal) {
        for (const file of files) {
            if (signal.aborted) throw new DOMException('Aborted', 'AbortError');

            const formData = new FormData();
            formData.append('file', file);  // Cambia 'file' si tu webhook espera otro nombre (ej: 'archivo', 'attachment')

            let attempts = 0;
            while (attempts < 3) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        body: formData,
                        signal
                    });

                    if (!response.ok) {
                        const errorText = await response.text().catch(() => 'Sin detalles');
                        throw new Error(`status: ${response.status} - ${errorText}`);
                    }

                    statusDiv.textContent = `OK → ${file.name} a ${url}`;
                    break;
                } catch (err) {
                    attempts++;
                    if (attempts >= 3 || signal.aborted) throw err;
                    statusDiv.textContent = `Reintento ${attempts}/3 en ${file.name}...`;
                    await new Promise(r => setTimeout(r, 2000 * attempts));
                }
            }
            await new Promise(r => setTimeout(r, 1200)); // rate limit suave
        }
    }
</script>

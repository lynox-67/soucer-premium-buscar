<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYNOX x GAEL • OBFUSCATOR EXTREMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;family=Roboto+Mono:wght@400;700&amp;display=swap');
        body { background: linear-gradient(135deg, #0a0a0a, #1a1a2e); }
        .gold { color: #ffd700; text-shadow: 0 0 20px #ffd700; }
        .card { background: rgba(15, 23, 42, 0.95); border: 2px solid #ffd700; }
    </style>
</head>
<body class="min-h-screen text-white font-mono">
    <div class="max-w-3xl mx-auto pt-12 pb-20">
        <div class="text-center mb-10">
            <h1 class="text-6xl font-bold tracking-widest gold mb-2">LYNOX<span class="text-white">x</span>GAEL</h1>
            <p class="text-xl text-amber-400">OBFUSCATOR EXTREMO • FULL SEGURO • OFFLINE</p>
            <p class="text-xs text-gray-500 mt-2">100% LOCAL • NADA SE ENVÍA • NUNCA INTERFIERE CON TU SCRIPT</p>
        </div>

        <div class="card rounded-3xl p-10 shadow-2xl">
            <div id="dropzone" 
                 class="border-4 border-dashed border-amber-400 rounded-2xl p-16 text-center cursor-pointer transition-all hover:border-white hover:bg-white/5">
                <input type="file" id="fileInput" accept=".lua,.txt" class="hidden">
                <div class="text-4xl mb-4">📤</div>
                <p class="text-2xl gold font-bold mb-2">Arrastra tu script .lua aquí</p>
                <p class="text-gray-400">o haz clic para seleccionar</p>
                <p class="text-xs text-gray-500 mt-8">Solo archivos .lua • Máximo 500KB</p>
            </div>

            <div id="status" class="hidden mt-8 text-center">
                <div class="inline-flex items-center gap-3 text-amber-400">
                    <div class="w-5 h-5 border-4 border-amber-400 border-t-transparent rounded-full animate-spin"></div>
                    <span class="font-bold text-xl" id="statusText">OBFUSCANDO A NIVEL EXTREMO...</span>
                </div>
            </div>
        </div>

        <div class="mt-8 text-center text-xs text-gray-500">
            BY LYNOX X GAEL
        </div>
    </div>

    <script>
        const keywords = ["and","break","do","else","elseif","end","false","for","function","if","in","local","nil","not","or","repeat","return","then","true","until","while"];

        function generateRandomName() {
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_";
            let name = "_";
            for (let i = 0; i < 28; i++) {
                name += chars[Math.floor(Math.random() * chars.length)];
            }
            return name;
        }

        function renameVariables(code) {
            const varMap = new Map();
            return code.replace(/\b([a-zA-Z_][a-zA-Z0-9_]*)\b/g, (match) => {
                if (keywords.includes(match) || match.length < 3 || match.startsWith("__")) return match;
                if (!varMap.has(match)) {
                    varMap.set(match, generateRandomName());
                }
                return varMap.get(match);
            });
        }

        function addControlFlow(code) {
            const lines = code.split('\n');
            const result = [];
            for (let line of lines) {
                if (line.trim() && Math.random() > 0.45) {
                    const fake = `if ${Math.floor(Math.random()*99999)+10000} == ${Math.floor(Math.random()*99999)+10000} then ${line} else local ${generateRandomName()} = 0 end`;
                    result.push(fake);
                } else {
                    result.push(line);
                }
            }
            return result.join('\n');
        }

        function addInsaneJunk(code) {
            const junkTemplates = [
                `local ${generateRandomName()} = function() for _=1,math.huge do break end end`,
                `repeat local ${generateRandomName()}=0 until ${Math.random() > 0.5}`,
                `local ${generateRandomName()} = {${Math.floor(Math.random()*999999)}}; for k,v in pairs({}) do end`,
                `pcall(function() local ${generateRandomName()}=debug.traceback() end)`,
                `if ${Math.floor(Math.random()*99999)} == ${Math.floor(Math.random()*99999)} then local ${generateRandomName()}=nil end`
            ];
            for (let i = 0; i < 42; i++) {
                code = junkTemplates[Math.floor(Math.random() * junkTemplates.length)] + "\n" + code;
            }
            return code;
        }

        function addAntiDumper() {
            return `-- ANTI-DUMPER MAX + ANTI-HOOK
local mt = getrawmetatable(game) or {}
local old = mt.__index
mt.__index = function(a,b){
    if (typeof b === "string" && (b.includes("debug") || b === "getgc" || b === "dump")) {
        error("ANTI-DUMPER TRIGGERED")
    }
    return old(a,b)
}
setrawmetatable(game, mt)
if hookmetamethod then hookmetamethod(game,"__index",function(){error("BLOCKED")}) end
if getgenv then getgenv().debug=nil end
`;
        }

        function obfuscateLua(originalCode) {
            let code = renameVariables(originalCode);
            code = addControlFlow(code);
            code = addInsaneJunk(code);
            code = addAntiDumper() + code;
            
            // SOLO ESTO AL PRINCIPIO (comentario que NO interfiere con tu script)
            return `-- BY LYNOX X GAEL\n` + code;
        }

        // ==================== FRONTEND ====================
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const statusText = document.getElementById('statusText');

        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('!border-white', 'bg-white/10'); });
        dropzone.addEventListener('dragleave', () => { dropzone.classList.remove('!border-white', 'bg-white/10'); });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('!border-white', 'bg-white/10');
            handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            if (!file || (!file.name.toLowerCase().endsWith('.lua') && !file.name.toLowerCase().endswith('.txt'))) {
                alert('❌ Solo archivos .lua o .txt');
                return;
            }

            dropzone.classList.add('opacity-50', 'pointer-events-none');
            status.classList.remove('hidden');
            statusText.textContent = 'OBFUSCANDO...';

            try {
                const text = await file.text();
                const obfuscated = obfuscateLua(text);

                const blob = new Blob([obfuscated], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `obfuscated_by_lynox_x_gael_${Date.now()}.lua`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                statusText.innerHTML = `✅ LISTO • <span class="text-green-400">BY LYNOX X GAEL</span>`;
                setTimeout(() => {
                    dropzone.classList.remove('opacity-50', 'pointer-events-none');
                    status.classList.add('hidden');
                    alert('✅ Archivo descargado\nSolo dice BY LYNOX X GAEL al principio (no interfiere)');
                }, 1500);

            } catch (err) {
                alert('Error al procesar');
                dropzone.classList.remove('opacity-50', 'pointer-events-none');
                status.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
